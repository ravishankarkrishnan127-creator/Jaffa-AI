<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaffa AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:"Segoe UI",system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.phone{width:390px;height:844px;border-radius:50px;border:3px solid #2a2a4a;box-shadow:0 0 0 6px #0d0d1a,0 0 0 8px #2a2a4a,0 40px 100px rgba(0,0,0,.8);overflow:hidden;position:relative}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:30px;background:#0d0d1a;border-radius:0 0 20px 20px;z-index:100}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:#0d0d1a;transition:transform .4s cubic-bezier(.4,0,.2,1),opacity .4s ease}
.screen.hidden{transform:translateX(-100%);opacity:0;pointer-events:none}
.screen.slide-in{transform:translateX(100%);opacity:0;pointer-events:none}
.status-bar{padding:14px 24px 6px;display:flex;justify-content:space-between;font-size:12px;color:#aaa;flex-shrink:0}
/* LOGO RIBBON */
.logo-bar{padding:6px 20px 10px;display:flex;justify-content:center;align-items:center;flex-shrink:0}
.logo-ribbon{position:relative;background:linear-gradient(180deg,#fff 0%,#e8e8e8 100%);padding:10px 28px 10px 56px;border-radius:3px;display:inline-flex;align-items:center;box-shadow:0 6px 24px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.3)}
.logo-ribbon::before{content:"";position:absolute;left:-13px;top:0;border-top:23px solid transparent;border-right:14px solid #d0d0d0;border-bottom:23px solid transparent}
.logo-ribbon::after{content:"";position:absolute;right:-13px;top:0;border-top:23px solid transparent;border-left:14px solid #d0d0d0;border-bottom:23px solid transparent}
.mic-icon{position:absolute;left:12px;font-size:26px;filter:drop-shadow(0 2px 6px rgba(0,80,200,.5))}
.logo-text{font-size:26px;font-weight:900;letter-spacing:1.5px;line-height:1}
.logo-text .jaffa{color:#1565c0}
.logo-text .ai{color:#e65100}

/* LOGIN */
.tagline-section{padding:16px 24px 4px;text-align:center;flex-shrink:0}
.tagline{font-size:18px;font-weight:700;color:#fff;line-height:1.3}
.tagline em{font-style:normal;color:#e65100}
.tagline-sub{font-size:12px;color:#555;margin-top:4px}
.login-section{padding:14px 24px 28px;flex-shrink:0}
.phone-input-wrapper{display:flex;align-items:center;background:#161630;border:1.5px solid #2a2a50;border-radius:14px;overflow:hidden;transition:border-color .2s}
.phone-input-wrapper:focus-within{border-color:#1565c0;box-shadow:0 0 0 3px rgba(21,101,192,.15)}
.phone-input-wrapper.error{border-color:#e53935;box-shadow:0 0 0 3px rgba(229,57,53,.12)}
.country-code{padding:0 14px;font-size:16px;font-weight:600;color:#aaa;border-right:1px solid #2a2a50;height:54px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.phone-input{flex:1;background:transparent;border:none;outline:none;padding:0 16px;height:54px;font-size:18px;font-weight:600;color:#fff;letter-spacing:1px;caret-color:#e65100}
.phone-input::placeholder{color:#333;font-weight:400;font-size:15px;letter-spacing:0}
.error-msg{font-size:12px;color:#ef5350;margin-top:6px;padding-left:4px;height:18px;opacity:0;transition:opacity .3s ease}
.error-msg.show{opacity:1}
.error-msg.fade{opacity:0}
.cta-btn{width:100%;height:54px;background:linear-gradient(135deg,#1565c0 0%,#0d47a1 100%);border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 24px rgba(21,101,192,.35);transition:all .15s ease;position:relative;overflow:hidden}
.cta-btn:hover{transform:translateY(-1px)}
.cta-btn:active{transform:scale(.98)}
.cta-btn::after{content:"";position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e65100,#ff8f00);border-radius:0 0 14px 14px}
.ball-btn{width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e53935,#b71c1c);box-shadow:0 0 8px rgba(229,57,53,.6);flex-shrink:0}
/* MATCHES */
.matches-header{position:relative;padding:8px 20px 10px;display:flex;justify-content:center;align-items:center;flex-shrink:0;border-bottom:1px solid #1a1a30}
.matches-header .logo-ribbon{transform:scale(.78);transform-origin:center}
.user-avatar{position:absolute;right:18px;width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1565c0,#e65100);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;cursor:pointer}
.filter-tabs{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid #1a1a30;scrollbar-width:none}
.filter-tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .15s;border:1px solid #252550;color:#666;background:transparent;user-select:none}
.tab.active{background:#1565c0;color:#fff;border-color:#1565c0}
.matches-list{flex:1;overflow-y:auto;padding:10px 0;scrollbar-width:none}
.matches-list::-webkit-scrollbar{display:none}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;padding:40px;text-align:center}
.empty-icon{font-size:48px;opacity:.4}
.empty-title{font-size:15px;font-weight:700;color:#444}
.empty-sub{font-size:12px;color:#333;line-height:1.5}
.match-card{margin:0 12px 10px;background:linear-gradient(135deg,#111125 0%,#14142a 100%);border:1px solid #1e1e3a;border-radius:16px;padding:14px 16px;cursor:pointer;transition:all .15s ease;position:relative;overflow:hidden}
.match-card:hover{border-color:#1565c0;transform:translateY(-1px)}
.match-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#1565c0,#e65100);opacity:0;transition:opacity .15s}
.match-card:hover::before{opacity:1}
.match-meta-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.match-type{font-size:10px;color:#e65100;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.live-dot{display:flex;align-items:center;gap:5px;font-size:10px;color:#ff4444;font-weight:600}
.live-dot::before{content:"";width:6px;height:6px;border-radius:50%;background:#ff4444;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.upcoming-badge{font-size:10px;color:#ff9f40;font-weight:600}
.completed-badge{font-size:10px;color:#4caf50;font-weight:600}
.teams-row{display:flex;align-items:center;justify-content:space-between}
.team-block{flex:1}
.team-block.right{text-align:right}
.team-flag-name{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:800;color:#fff}
.team-block.right .team-flag-name{justify-content:flex-end}
.team-flag{font-size:18px}
.team-score-line{margin-top:4px}
.score-main{font-size:20px;font-weight:800;color:#fff}
.score-main span{font-size:13px;color:#666;font-weight:400}
.score-main.winner{color:#4caf50}
.score-overs{font-size:11px;color:#555;margin-top:2px}
.vs-block{padding:0 10px;text-align:center}
.vs-text{font-size:11px;color:#444;font-weight:600}
.match-status{margin-top:10px;padding-top:10px;border-top:1px solid #1a1a30;font-size:12px;color:#888;line-height:1.6}
.hl-g{color:#9fff6e;font-weight:600}
.hl-o{color:#ff9f40;font-weight:600}
.hl-b{color:#64b5f6;font-weight:600}
.result-banner{color:#4caf50;font-weight:700;font-size:12px;margin-top:4px}
.bottom-nav{display:flex;justify-content:space-around;padding:10px 0 20px;background:#0a0a14;border-top:1px solid #1a1a30;flex-shrink:0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex:1;padding:6px 0;border-radius:10px;transition:background .15s}
.nav-item:active{background:rgba(21,101,192,.15)}
.nav-icon{font-size:22px}
.nav-label{font-size:10px;color:#555;letter-spacing:.5px;text-transform:uppercase;font-weight:600}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 6px #1565c0)}
.nav-item.active .nav-label{color:#60a5fa}
#loadingFlash{position:absolute;inset:0;background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:200;transition:opacity .5s ease}
#loadingFlash.gone{opacity:0;pointer-events:none}
.loading-logo{font-size:32px;font-weight:900;letter-spacing:2px}
.loading-logo .jaffa{color:#1565c0}
.loading-logo .ai{color:#e65100}
.loading-bar{width:120px;height:3px;background:#1a1a30;border-radius:3px;overflow:hidden}
.loading-bar-fill{height:100%;width:0;border-radius:3px;background:linear-gradient(90deg,#1565c0,#e65100);animation:load 1.2s ease forwards}

.det-series-lbl{font-size:11px;color:#666;letter-spacing:.5px;text-align:center;flex:1;padding:0 8px}
.score-strip{background:linear-gradient(160deg,#0c0c22 0%,#0f1428 100%);padding:10px 16px 12px;flex-shrink:0;border-bottom:1px solid #1a1a30}
.ss-teams-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.ss-tcol{flex:1}
.ss-tcol.right{text-align:right}
.ss-tname{font-size:12px;color:#888;margin-bottom:4px;display:flex;align-items:center;gap:5px;font-weight:600}

.ss-tscore{font-size:26px;font-weight:900;color:#eee;line-height:1.1}

.ss-vs{font-size:11px;color:#2a2a40;font-weight:800;padding:0 6px;margin-top:8px}

// Returns a short series tag for display in match cards
function _seriesTag(m){
  const lbl=m.label;
  if(lbl.includes("IPL")) return "IPL";
  if(lbl.includes("PSL")) return "PSL";
  if(lbl.includes("BBL")) return "BBL";
  if(lbl.includes("CPL")) return "CPL";
  if(lbl.includes("SA20")) return "SA20";
  if(lbl.includes("ILT20")) return "ILT20";
  // International: show "T1 vs T2" using team abbreviations
  return m.team1.name+" vs "+m.team2.name;
}

// Sort priority: 0=IPL, 1=Mens Intl, 2=PSL, 3=Womens
function _matchPriority(m){
  const lbl=m.label;
  const t1=m.team1.name, t2=m.team2.name;
  if(lbl.includes("IPL")) return 0;
  if(lbl.includes("PSL")) return 2;
  if(t1.includes("-W")||t2.includes("-W")||lbl.toLowerCase().includes("women")) return 3;
  return 1; // mens international
}
// Extract match number for recency sort within a series (higher = more recent)
function _matchNumber(m){
  const n=m.label.match(/(\d+)(?:st|nd|rd|th)?\s*Match/i);
  return n?parseInt(n[1]):0;
}

  const raw = matchData[tab] || [];
  // Sort: by series priority, then most recent match first within each series
  const matches = [...raw].sort((a,b)=>{
    const pd=_matchPriority(a)-_matchPriority(b);
    if(pd!==0) return pd;
    return _matchNumber(b)-_matchNumber(a); // higher match number = more recent = first
  });
  if (!matches.length) {
    list.innerHTML="<div class=empty-state><div class=empty-icon>🏟️</div><div class=empty-title>No matches here</div><div class=empty-sub>Check back soon</div></div>";
    return;
  }
  list.innerHTML = matches.map(m => {
    const s1 = m.team1.score ? "<div class=score-main"+(m.team1.winner?" winner":"")+">"+m.team1.score+(m.team1.wkts?" <span>/ "+m.team1.wkts+"</span>":"")+"</div><div class=score-overs>"+m.team1.overs+"</div>" : "";
    const s2 = m.team2.score ? "<div class=score-main"+(m.team2.winner?" winner":"")+">"+m.team2.score+(m.team2.wkts?" <span>/ "+m.team2.wkts+"</span>":"")+"</div><div class=score-overs>"+m.team2.overs+"</div>" : "";
    const badge = m.badge==="live" ? "<div class=live-dot>LIVE</div>" : m.badge==="upcoming" ? "<div class=upcoming-badge>⏳ UPCOMING</div>" : "<div class=completed-badge>✅ DONE</div>";
    const tag = _seriesTag(m);
    return "<div class=match-card data-lbl='"+m.label+"' onclick='openMatchDetail(this.dataset.lbl)' style='cursor:pointer'><div class=match-meta-row><div class=match-type>"+tag+"</div>"+badge+"</div><div class=teams-row><div class=team-block><div class=team-flag-name><span class=team-flag>"+m.team1.flag+"</span><span>"+m.team1.name+"</span></div><div class=team-score-line>"+s1+"</div></div><div class=vs-block><div class=vs-text>vs</div></div><div class='team-block right'><div class=team-flag-name><span>"+m.team2.name+"</span><span class=team-flag>"+m.team2.flag+"</span></div><div class=team-score-line>"+s2+"</div></div></div><div class=match-status>"+m.status+"<br>"+m.extra+(m.result?"<div class=result-banner>"+m.result+"</div>":"")+"</div></div>";
  }).join("");
}

function switchTab(el, tab) {
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active"); currentTab = tab; renderMatches(tab);
}

window.addEventListener("load", () => {
  const saved = localStorage.getItem(LOGIN_KEY);
  if (saved) showMatchesInstant(saved);
  history.replaceState({screen:"matches"},"");
  history.pushState({screen:"matches"},"");
});
window.addEventListener("popstate", () => {
  if (!localStorage.getItem(LOGIN_KEY)) return;
  const onDetail = !document.getElementById("matchDetailScreen").classList.contains("slide-in");
  if (onDetail) {
    stopDetailPlay();
    document.getElementById("matchDetailScreen").classList.add("slide-in");
    document.getElementById("matchesScreen").classList.remove("hidden");
    history.pushState({screen:"matches"},"");
  } else {
    history.pushState({screen:"matches"},"");
  }
});

function handleInput(input) {
  input.value = input.value.replace(/\D/g,"");
  if (input.value.length>0) { document.getElementById("inputWrapper").classList.remove("error"); hideError(); }
}
function isValid(n){ return /^[6-9]\d{9}$/.test(n); }
function showError(msg){
  const el=document.getElementById("errorMsg"),w=document.getElementById("inputWrapper");
  if(errorTimer)clearTimeout(errorTimer);
  el.textContent=msg;el.classList.remove("fade");el.classList.add("show");w.classList.add("error");
  errorTimer=setTimeout(()=>{el.classList.add("fade");setTimeout(()=>{el.classList.remove("show","fade");w.classList.remove("error");},300);},3000);
}
function hideError(){
  if(errorTimer)clearTimeout(errorTimer);
  document.getElementById("errorMsg").classList.remove("show","fade");
  document.getElementById("inputWrapper").classList.remove("error");
}
function handleLogin(){
  const p=document.getElementById("phoneInput").value.trim();
  if(!p){showError("Please enter your mobile number");return;}
  if(p.length<10){showError("Number must be 10 digits");return;}
  if(!isValid(p)){showError("Must start with 6, 7, 8 or 9 — try again");return;}
  localStorage.setItem(LOGIN_KEY,p); hideError(); showMatchesAnimated(p);
}
function showMatchesAnimated(phone){
  updateUserUI(phone);
  document.getElementById("matchesScreen").classList.remove("slide-in","hidden");
  document.getElementById("loginScreen").classList.add("hidden");
  const flash=document.getElementById("loadingFlash");
  flash.classList.remove("gone");
  setTimeout(()=>{ flash.classList.add("gone"); renderMatches("live"); },1600);
  history.pushState({screen:"matches"},"");
}
function showMatchesInstant(phone){
  updateUserUI(phone);
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("matchesScreen").classList.remove("slide-in","hidden");
  document.getElementById("loadingFlash").classList.add("gone");
  renderMatches("live");
}
function updateUserUI(phone){
  document.getElementById("userAvatar").textContent=phone.slice(-2,-1).toUpperCase()||"R";
  document.getElementById("logoutSub").textContent="Logged in as +91 "+phone.slice(0,5)+"·····";
}

function switchBottomTab(tab, el){
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  if(el) el.classList.add("active");
  if(tab==="home"){
    // Home: scroll to top of matches screen, switch to live tab
    switchTab(document.querySelector(".tab"), "live");
    window.scrollTo(0,0);
  } else if(tab==="matches"){
    renderMatches(currentTab);
  }
}
function toggleLogout(){ logoutOpen=!logoutOpen; document.getElementById("logoutPanel").classList.toggle("show",logoutOpen); }
function doLogout(){
  localStorage.removeItem(LOGIN_KEY); logoutOpen=false;
  document.getElementById("logoutPanel").classList.remove("show");
  document.getElementById("loginScreen").classList.remove("hidden");
  document.getElementById("matchesScreen").classList.add("slide-in");
  document.getElementById("phoneInput").value="";
  history.replaceState({screen:"login"},"");
}

  if(!_audioCtx){try{_audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(_audioCtx&&_audioCtx.state==="suspended") _audioCtx.resume();
  if(_audioCtx){
    const buf=_audioCtx.createBuffer(1,1,22050);
    const src=_audioCtx.createBufferSource();
    src.buffer=buf;src.connect(_audioCtx.destination);src.start(0);
  }
  // Also prime Web Speech voice list
  try{if(window.speechSynthesis&&!speechSynthesis.getVoices().length) speechSynthesis.getVoices();}catch(e){}
}

// ── CROWD NOISE via Web Audio API ──
// Generates procedural crowd noise — no external files needed.
// type: "big" (wicket/six), "medium" (four), "ambient" (normal ball)
function _playCrowdNoise(type){
  try{
    if(!_audioCtx) return;
    if(_audioCtx.state==="suspended") _audioCtx.resume();
    const ctx=_audioCtx;
    const dur=type==="big"?2.8:type==="medium"?1.6:0.9;
    const bufSize=Math.ceil(ctx.sampleRate*dur);
    const buf=ctx.createBuffer(2,bufSize,ctx.sampleRate);
    // Pink noise via Paul Kellett's method
    for(let ch=0;ch<2;ch++){
      const data=buf.getChannelData(ch);
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for(let i=0;i<bufSize;i++){
        const wh=Math.random()*2-1;
        b0=0.99886*b0+wh*0.0555179; b1=0.99332*b1+wh*0.0750759;
        b2=0.96900*b2+wh*0.1538520; b3=0.86650*b3+wh*0.3104856;
        b4=0.55000*b4+wh*0.5329522; b5=-0.7616*b5-wh*0.0168980;
        data[i]=(b0+b1+b2+b3+b4+b5+b6+wh*0.5362)/7;
        b6=wh*0.115926;
      }
    }
    const src=ctx.createBufferSource();
    src.buffer=buf;
    // Bandpass: crowd voice range ~300-3500 Hz
    const bp=ctx.createBiquadFilter();
    bp.type="bandpass"; bp.frequency.value=900; bp.Q.value=0.5;
    // Master gain with envelope — swell up then fade
    const gain=ctx.createGain();
    const baseVol=type==="big"?0.38:type==="medium"?0.22:0.10;
    gain.gain.setValueAtTime(0,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(baseVol,ctx.currentTime+0.18);
    if(type==="big"){
      gain.gain.linearRampToValueAtTime(baseVol*1.3,ctx.currentTime+0.6);
      gain.gain.linearRampToValueAtTime(baseVol*0.9,ctx.currentTime+1.4);
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);
    } else {
      gain.gain.linearRampToValueAtTime(baseVol,ctx.currentTime+dur*0.4);
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);
    }
    src.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
    src.start(ctx.currentTime); src.stop(ctx.currentTime+dur);
  }catch(e){}
}

// ── INSTANT: Web Speech API (zero latency) ──
function _speakNow(text,type){
  try{
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=(type==="WICKET"||type==="SIX")?1.25:1.1;
    u.pitch=(type==="WICKET"||type==="SIX")?1.3:1.05;
    u.volume=1.0;
    const voices=speechSynthesis.getVoices();
    const pick=voices.find(v=>/en/i.test(v.lang)&&/(google|daniel|alex|rishi|moira|samantha)/i.test(v.name))
              ||voices.find(v=>/en.*in/i.test(v.lang))||voices.find(v=>/en/i.test(v.lang));
    if(pick) u.voice=pick;
    speechSynthesis.speak(u);
  }catch(e){}
}

// Async version — resolves when speech ends (for sequential playback)
function _speakNowAsync(text,type){
  return new Promise(resolve=>{
    try{
      if(!window.speechSynthesis){resolve();return;}
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.rate=(type==="WICKET"||type==="SIX")?1.22:(type==="NORMAL"||type==="DOT"||type==="SINGLE")?1.15:1.1;
      u.pitch=(type==="WICKET"||type==="SIX")?1.3:(type==="FOUR"||type==="FIFTY"||type==="HUNDRED")?1.1:1.05;
      u.volume=1.0;
      const voices=speechSynthesis.getVoices();
      const pick=voices.find(v=>/en/i.test(v.lang)&&/(google|daniel|alex|rishi|moira|samantha)/i.test(v.name))
                ||voices.find(v=>/en.*in/i.test(v.lang))||voices.find(v=>/en/i.test(v.lang));
      if(pick) u.voice=pick;
      const tOut=setTimeout(resolve,Math.max(3500,text.length*65));
      u.onend=()=>{clearTimeout(tOut);resolve();};
      u.onerror=()=>{clearTimeout(tOut);resolve();};
      speechSynthesis.speak(u);
    }catch(e){resolve();}
  });
}

// ── GEMINI TTS via proxy (Puck=energetic, Fenrir=deep/dramatic) ──
async function _fetchGeminiTTS(text,voiceIdx){
  const voiceName=voiceIdx===1?"Fenrir":"Puck";
  const resp=await fetch(PROXY+"/gemini/tts",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      contents:[{parts:[{text}]}],
      generationConfig:{responseModalities:["AUDIO"],
        speechConfig:{voiceConfig:{prebuiltVoiceConfig:{voiceName}}}}
    })
  });
  if(!resp.ok) throw new Error("Gemini proxy "+resp.status);
  const j=await resp.json();
  if(j.error) throw new Error("Gemini: "+j.error);
  const part=j.candidates?.[0]?.content?.parts?.[0]?.inlineData;
  if(!part?.data) throw new Error("No audio in Gemini response");
  const bin=atob(part.data);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  const mime=part.mimeType||"audio/wav";
  let blob;
  if(mime.includes("L16")||mime.includes("pcm")){
    const sr=parseInt((mime.match(/rate=(\d+)/)||[])[1]||24000);
    blob=_pcmToWav(arr,sr);
  } else {
    blob=new Blob([arr],{type:mime});
  }
  return URL.createObjectURL(blob);
}

function _pcmToWav(pcm,sr=24000){
  const n=pcm.length, buf=new ArrayBuffer(44+n), v=new DataView(buf);
  const ws=(s,o)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  ws("RIFF",0);v.setUint32(4,36+n,true);ws("WAVE",8);ws("fmt ",12);
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);
  v.setUint16(34,16,true);ws("data",36);v.setUint32(40,n,true);
  new Uint8Array(buf).set(pcm,44);
  return new Blob([buf],{type:"audio/wav"});
}

// ── CAMB AI TTS via proxy (Brad/Jake, ~50s) ──
async function _fetchCambTTS(text,voiceIdx){
  const voiceId=_cambVoices[voiceIdx%_cambVoices.length];
  const r1=await fetch(PROXY+"/camb/tts",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text,voice_id:voiceId,language:1,gender:1,age:30})
  });
  if(!r1.ok) throw new Error("CAMB submit "+r1.status);
  const d1=await r1.json();
  if(d1.error) throw new Error("CAMB: "+d1.error);
  const {task_id}=d1;
  let run_id=null;
  for(let i=0;i<30;i++){
    await new Promise(res=>setTimeout(res,2000));
    const r2=await fetch(PROXY+"/camb/tts/"+task_id);
    const s=await r2.json();
    if(s.status==="SUCCESS"){run_id=s.run_id;break;}
    if(s.status==="FAILED") throw new Error("CAMB failed");
  }
  if(!run_id) throw new Error("CAMB timeout");
  const r3=await fetch(PROXY+"/camb/result/"+run_id);
  const res=await r3.json();
  const audioUrl=res.output_url||res.url;
  if(!audioUrl) throw new Error("No audio URL from CAMB");
  // Fetch audio bytes immediately → convert to local blob URL so it never expires
  // and avoids any CORS issues at playback time
  const audioResp=await fetch(audioUrl);
  if(!audioResp.ok) throw new Error("CAMB audio fetch "+audioResp.status);
  const audioBlob=await audioResp.blob();
  return URL.createObjectURL(audioBlob);
}

// ── UNIFIED TTS: Camb AI primary → Gemini AI Studio backup ──
// Device/browser voices are NEVER used.
// Convert cricket score notation to natural spoken form before TTS.
// "156/9" → "156 for 9"   "156/10" → "156 all out"   "45/0" → "45 for no loss"
function _spokenScore(text){
  return text.replace(/\b(\d+)\/(\d+)\b/g,(match,runs,wkts)=>{
    const w=parseInt(wkts);
    if(w===10) return runs+" all out";
    if(w===0)  return runs+" for no loss";
    return runs+" for "+w;
  });
}

async function _fetchTTS(text,voiceIdx){
  // Sanitise score notation so TTS doesn't say "156 slash 9"
  const spoken=_spokenScore(text);
  // PRIMARY: Camb AI (Brad=1 / Jake=0)
  try{ return await _fetchCambTTS(spoken,voiceIdx); }
  catch(e){ console.warn("Camb AI TTS failed, trying Gemini:",e.message); }
  // BACKUP: Google AI Studio (Fenrir=1 / Puck=0)
  try{ return await _fetchGeminiTTS(spoken,voiceIdx); }
  catch(e2){ console.warn("Gemini TTS also failed:",e2.message); }
  throw new Error("All TTS providers failed");
}

async function _playAudio(url, gen){
  // Stop any current audio
  if(_currentAudio){try{_currentAudio.stop();}catch(e){try{_currentAudio.pause();}catch(e2){}} _currentAudio=null;}
  return new Promise(async(resolve)=>{
    try{
      // Use Web Audio API — once AudioContext is unlocked (via _unlockAudio in click handler),
      // all audio played through it works regardless of timing. Bypasses autoplay policy.
      if(!_audioCtx) _audioCtx=new (window.AudioContext||window.webkitAudioContext)();
      if(_audioCtx.state==="suspended") await _audioCtx.resume();
      const resp=await fetch(url);
      if(!resp.ok) throw new Error("fetch "+resp.status);
      const buf=await resp.arrayBuffer();
      const decoded=await _audioCtx.decodeAudioData(buf);
      // Guard: if a new style was clicked while we were fetching/decoding, abort
      if(gen!==undefined&&gen!==_detGen){resolve();return;}
      const src=_audioCtx.createBufferSource();
      src.buffer=decoded;
      src.connect(_audioCtx.destination);
      src.onended=resolve;
      _currentAudio=src;
      src.start(0);
    }catch(e){
      resolve(); // silent fail — chain continues to next entry
    }
  });
}

// Directly search CricAPI for a completed match's apiId so the scorecard can be loaded immediately.
// Called when a user opens a completed match before the background poll has assigned its apiId.
async function _searchAndFetchMatchDetails(label, m){
  const body=document.getElementById("detBody");
  if(body) body.innerHTML="<div style='padding:40px;text-align:center;color:#888'>⏳ Loading match data…</div>";
  try{
    // Search both offsets in parallel — uses 2 API calls but only on explicit user action
    const [r0,r25]=await Promise.all([
      fetch(_cricketURL("currentMatches",{offset:0})),
      fetch(_cricketURL("currentMatches",{offset:25}))
    ]);
    const [d0,d25]=await Promise.all([r0.json(),r25.json()]);
    const candidates=[...(d0.data||[]),...(d25.data||[])];
    // Match by team name (handles full names, abbrev, and reversed order)
    const mt1=m.team1.name.toLowerCase(), mt2=m.team2.name.toLowerCase();
    function _nm(a,b){ return a.includes(b)||b.includes(a); }
    const found=candidates.find(c=>{
      if(!c.teams||c.teams.length<2) return false;
      const t0=c.teams[0].toLowerCase(), t1=c.teams[1].toLowerCase();
      return (_nm(t0,mt1)&&_nm(t1,mt2))||(_nm(t0,mt2)&&_nm(t1,mt1));
    });
    if(found){
      m.apiId=found.id; // persist for future opens
      _autoFetchMatchDetails(label,found.id);
    } else {
      // Match not in CricAPI window — build scorecard from matchData hardcoded scores + show basic info
      if(body) body.innerHTML="<div style='padding:40px;text-align:center;color:#666'>📋 Full scorecard unavailable for this match (API window expired). Scores: "+
        m.team1.name+" "+m.team1.score+(m.team1.wkts?"/"+m.team1.wkts:"")+" · "+
        m.team2.name+" "+m.team2.score+(m.team2.wkts?"/"+m.team2.wkts:"")+"<br><br>"+
        "<span style='color:#888;font-size:12px'>CricAPI only stores recent matches. Check ESPN Cricinfo for the full scorecard.</span></div>";
    }
  }catch(e){
    console.warn("_searchAndFetchMatchDetails failed:",e);
    if(body) body.innerHTML="<div style='padding:40px;text-align:center;color:#666'>⚠️ Could not load match data. Check your connection.</div>";
  }
}

      `${bwl} ne back-of-length tight dala — ${bat} ke bat ke paas aaya lekin koi shot nahi bana, ruk gaye. Dot.`,
      `${bwl} ka good-length delivery off stump par — ${bat} ne push-drive kiya par cover fielder ne rok liya. Acha fielding, dot ball.`,
      `${bwl} slow delivery with dip — ${bat} ne pehle aage badhne ki koshish ki, ruk ke defend kiya. Miscommunication, dot.`,
      `${bwl} ne seam movement use kiya — ${bat} ka inside edge bat aur pad ke beech fas gaya. Dot.`,
    ];
    const ONE_T=(bwl,bat)=>[
      `${bwl} ko ${bat} ne mid-wicket ki taraf wrist flick kiya — on-side mein quick single, dono crease par safe.`,
      `${bwl} full on middle — ${bat} ne long-on ki taraf seedha drive kiya, outfield mein daud ke ek run aaya.`,
      `${bwl} angled across — ${bat} ne fine leg ki taraf glance kiya, gend boundary ke thoda pehle ruki, ek run aaya.`,
      `${bwl} ki delivery thoda wide — ${bat} ne point ke upar se push kiya, gap se gend guzri lekin fielder ne aake roka. Ek run.`,
      `${bwl} short-of-length — ${bat} ne upper cut try kiya lekin edge nahi laga, gend third man ki taraf gayi. Single.`,
      `${bwl} ko ${bat} ne square leg flick kiya — running fast, non-striker end pe safe. Ek run.`,
      `${bwl} ne straight on pads — ${bat} ne sweep shot kiya, fine leg ki taraf gayi, comfortable single.`,
      `${bwl} off side pe swing — ${bat} ne late cut kiya, third man gap mein, aaram se ek run.`,
    ];
    const TWO_T=(bwl,bat)=>[
      `${bwl} to ${bat} — mid-on ke wide se drive kiya, cover-point aur mid-off ke beech gap, dono ne acchi daud lagayi. Do run.`,
      `${bwl} ne overpitch ki — ${bat} ne leg side mein powerful clip kiya, square leg aur mid-wicket ke beech, do run aaye.`,
      `${bwl} short aur wide outside off — ${bat} ne square cut kiya, gully fieldder ne daud ke roka lekin do run bane.`,
      `${bwl} ko ${bat} ne straight drive kiya, long-on ki taraf, good running ke baad do run mila.`,
      `${bwl} angled delivery — ${bat} ne flick maar ke mid-wicket gap mein bheja, gend outfield tak pahunchi, do run.`,
      `${bwl} ne outside off dali — ${bat} ka drive cover ke upar se gaya, fielder ne boundary pe rok ke do hi run diye.`,
    ];
    const THREE_T=(bwl,bat)=>[
      `${bwl} to ${bat} — deep mid-wicket ki taraf maari, boundary fielder ne diving stop ki lekin ek bounce ke baad teen run complete!`,
      `${bwl} ne short dali — ${bat} ne pull shot maar ke deep square leg ki taraf bheja, fielder ne rog aaye lekin acchi running, teen run liye!`,
      `${bwl} ki delivery outside off — ${bat} ne drive kiya, gend long-off aur long-on ke beech se nikli, quick three!`,
    ];
    const WIDE_T=(bwl)=>[
      `${bwl} ka angle bigda poori tarah — umpire ne wide signal kiya, gend leg stump ke bahut bahar gayi. Extra run milega.`,
      `${bwl} apni run-up mein kuch gad-bad ki, delivery leg side mein wide chali gayi. Immediately wide.`,
      `${bwl} ki yorker full toss ban gayi aur off stump se kaafi bahar — umpire ne haath uthaya. Wide.`,
      `${bwl} ne seam try kiya lekin direction control nahi raha, leg bye area mein wide. Disappointment.`,
    ];
    const NB_T=(bwl)=>[
      `${bwl} ne crease cross kar liya — umpire ne no ball call kiya! Agli delivery free hit hogi, batter ke liye chance!`,
      `${bwl} ka paon popping crease ke upar tha — no ball signalled! Batter ab bina wicket ke khel sakta hai agli ball pe.`,
    ];

    const fullOv=Math.floor(overs), partBalls=Math.round((overs-fullOv)*10);
    let cum=0, cumW=0;
    for(let ov=1;ov<=fullOv+(partBalls>0?1:0);ov++){
      const balls=(ov===fullOv+1&&partBalls>0)?partBalls:6;
      for(let b=1;b<=balls;b++){
        const ob=ov+"."+b;
        if(keyMap[ob]){
          result.push(keyMap[ob]);
          const m=(keyMap[ob].score||"").match(/(\d+)\/(\d+)/);
          if(m){cum=parseInt(m[1]);cumW=parseInt(m[2]);}
        } else {
          const s=_seed(dk+teamName+ov+b);
          const r=s%100;
          const bwl=_bwl(s), bat=_bat(s+3);
          let runs=0,type="NORMAL",txt;
          if(r<5){type="WIDE";txt=_rnd(WIDE_T(bwl),s);}
          else if(r<8){runs=0;txt=_rnd(NB_T(bwl),s);}
          else if(r<36){runs=0;type="DOT";txt=_rnd(DOT_T(bwl,bat),s);}
          else if(r<56){runs=1;txt=_rnd(ONE_T(bwl,bat),s);}
          else if(r<70){runs=2;txt=_rnd(TWO_T(bwl,bat),s);}
          else if(r<75){runs=3;txt=_rnd(THREE_T(bwl,bat),s);}
          else{runs=1;txt=_rnd(ONE_T(bwl,bat),s);}
          cum+=runs;
          const sc=teamName+" "+cum+"/"+cumW+" ("+ob+")";
          result.push({over:ob,type,text:txt,dramatic:txt,funny:txt,analytical:txt,score:sc,_syn:true});
        }
      }
    }
  }

  // Detect match type → correct overs cap. Check stored _matchType, then infer from label.
  function _oversCap(){
    const mt=(d._matchType||"").toLowerCase();
    const lbl=(dk||"").toLowerCase();
    if(mt.includes("test")||lbl.includes("test")) return 90;          // Test — no real cap
    if(mt.includes("odi")||mt.includes("list a")||lbl.includes("odi")||lbl.includes("one day")) return 50;
    return 20; // T20, T20I, IPL, BBL, PSL etc.
  }
  const _ovcap=_oversCap();
  const ov1=Math.min(_ovcap,parseFloat((d.bat1?.overs||String(_ovcap)+".0").replace(" ov",""))||_ovcap);
  const ov2=Math.min(_ovcap,parseFloat((d.bat2?.overs||String(_ovcap)+".0").replace(" ov",""))||_ovcap);
  fillInnings(km1,t1,ov1);
  // Visual separator between the two innings
  if(t2) result.push({_inningsSep:true,type:"INNINGS_SEP",text:"2nd Innings — "+t2+" Batting",score:"",over:"",_syn:false});
  fillInnings(km2,t2,ov2);
  return result;
}

let _bbbSubTab="highlights"; // "everyball" or "highlights"
function renderBBB(){
  const d=matchDetails[detKey];
  // For live matches: return the live feed container (populated by _startLiveCommentary / _preloadLiveBBB)
  if(!d||!d.bbb){
    const _all=[...matchData.live,...matchData.upcoming,...matchData.completed];
    const _m=_all.find(x=>x.label===detKey);
    if(_m&&_m.badge==="live"){
      return '<div id="liveFeed" style="display:flex;flex-direction:column;gap:10px;padding:12px"></div>'
           + '<div id="liveWaiting" style="padding:24px;text-align:center;color:#888;font-size:14px">🔴 Connecting to live feed…</div>';
    }
    return"<div style='padding:40px;text-align:center;color:#444'>Ball-by-ball coming soon</div>";
  }
  // Two sub-tabs: Every Ball (no audio) and Highlights (4s/6s/wickets/50s/100s with audio)

  const subTabs="<div style='display:flex;background:#0a0a18;border-bottom:2px solid #111'>"+
    "<button onclick='_bbbSubTab=\"everyball\";stopDetailPlay();renderDetBody()' style='flex:1;padding:10px 4px;border:none;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.4px;background:transparent;color:"+(eA?"#f59e0b":"#555")+";border-bottom:"+(eA?"2px solid #f59e0b":"2px solid transparent")+"'>📋 EVERY BALL</button>"+
    "<button onclick='_bbbSubTab=\"highlights\";stopDetailPlay();renderDetBody()' style='flex:1;padding:10px 4px;border:none;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.4px;background:transparent;color:"+(hA?"#f59e0b":"#555")+";border-bottom:"+(hA?"2px solid #f59e0b":"2px solid transparent")+"'>⭐ HIGHLIGHTS</button>"+
    "</div>";
  if(_bbbSubTab==="everyball"){
    _activeBBBList=_expandBBB(detKey);
    _bbbImportantOnly=false;
  } else {
    _activeBBBList=d.bbb.filter(b=>_BBB_IMPORTANT.has(b.type));
    _bbbImportantOnly=true;
  }
  // For highlights: detect innings change by score prefix and inject separator markers
  // We build a display list (may include separator objects) separate from _activeBBBList (play list)
  let _displayList;
  if(_bbbSubTab==="highlights"){
    const t1n=d.bat1?.team||"", t2n=d.bat2?.team||"";
    _displayList=[];
    let prevTeam=null;
    for(const b of _activeBBBList){
      const scoreTeam=(b.score||"").split(" ")[0];
      if(prevTeam&&scoreTeam&&scoreTeam!==prevTeam){
        _displayList.push({_inningsSep:true,text:"2nd Innings — "+t2n+" Batting"});
      }
      if(scoreTeam) prevTeam=scoreTeam;
      _displayList.push(b);
    }
  } else {
    _displayList=_activeBBBList; // everyball: separators already baked in from _expandBBB
  }

  const reversed=[..._displayList].reverse();
  // Map only non-separator items to compute DOM index matching _activeBBBList
  let playIdx=_activeBBBList.length-1; // tracks index in _activeBBBList (reversed)
  const items=reversed.map((b)=>{
    if(b._inningsSep){
      return "<div class='bbb-innings-sep' style='display:flex;align-items:center;gap:8px;padding:8px 12px;background:#0d1b2a;border-top:1px solid #1e3a5f;border-bottom:1px solid #1e3a5f;color:#60a5fa;font-size:11px;font-weight:700;letter-spacing:.8px;margin:4px 0'>🏏 "+b.text+"</div>";
    }
    const i=playIdx--;
    const isKey=_BBB_IMPORTANT.has(b.type);
    // Commentary text only shown in Highlights tab
    const jText=(isKey&&_bbbSubTab==="highlights")?b[detStyle]||b.dramatic||"":"";
    const badgeCls=isKey?b.type:"NORMAL";
    const typeLabel=isKey?b.type:"•";
    // Clear visual demarcation: key events get amber left border
    const borderStyle=isKey?"border-left:3px solid #f59e0b":"border-left:3px solid #1a1a2a";
    return "<div class='bbb-item"+(b._syn?" bbb-syn":"")+"' id='bbb"+i+"' style='"+borderStyle+"'><div class=bbb-meta><span class=bbb-over>"+b.over+"</span><span class='bbb-badge "+badgeCls+"'>"+typeLabel+"</span></div><div class=bbb-text>"+b.text+"</div>"+(jText?"<div class=bbb-jaffa id='bbbj"+i+"'>🎙️ "+jText+"</div>":"")+"<div class=bbb-score>"+b.score+"</div></div>";
  }).join("");
  return subTabs+items;
}

  const inn=(data)=>{
    const batRows=data.rows.map(r=>"<tr><td><span class=sc-bname>"+r.n+"</span>"+(r.no?"<span class=sc-notout>not out</span>":"<span class=sc-dismiss>"+r.d+"</span>")+"</td><td><b>"+r.r+"</b></td><td style='color:#555'>"+r.b+"</td><td>"+r.f+"</td><td>"+r.s+"</td></tr>").join("");
    const bowlRows=data.bowl.map(b=>"<tr><td>"+b.n+"</td><td>"+b.o+"</td><td>"+b.r+"</td><td><b>"+b.w+"</b></td><td style='color:#555'>"+b.eco+"</td></tr>").join("");
    return "<div class=sc-inn><div class=sc-inn-hdr><span class=sc-inn-team>"+data.team+" Innings</span><span class=sc-inn-total>"+data.total+" ("+data.overs+")</span></div><table class=sc-tbl><thead><tr><th>BATTER</th><th>R</th><th>B</th><th>4s</th><th>6s</th></tr></thead><tbody>"+batRows+"</tbody></table><div class=sc-sep>Bowling</div><table class=sc-tbl><thead><tr><th>BOWLER</th><th>O</th><th>R</th><th>W</th><th>ECO</th></tr></thead><tbody>"+bowlRows+"</tbody></table></div>";

function _showToast(msg,dur=3000){

    t.id="_jafToast";
    t.style.cssText="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:9999;pointer-events:none;transition:opacity 0.3s";

// ── COMMENTARY ──
let _detGen=0; // generation counter to prevent overlapping async chains
function startComm(style, btnEl){
  _unlockAudio(); // MUST be sync in click handler — unlocks AudioContext + Web Speech
  if(_liveState.active){_liveState.style=style;document.getElementById("ssCommStatus").textContent="🔴";return;}
  // Clicking the already-playing style = pause
  if(detPlaying&&style===detStyle){stopDetailPlay();return;}
  detStyle=style;
  stopDetailPlay(); // increments _detGen, kills old chain
  const myGen=_detGen; // capture current gen AFTER stopDetailPlay

  // Update active button highlight
  document.querySelectorAll(".ss-style-btn").forEach(b=>b.classList.remove("active"));
  if(btnEl) btnEl.classList.add("active");

  const d=matchDetails[detKey];
  if(!d||!d.bbb){
    _showToast("⏳ Commentary loading… please try again in a moment");
    return;
  }
  // For completed matches switch to highlights sub-tab
  const allM2=[...matchData.live,...matchData.upcoming,...matchData.completed];
  const curM2=allM2.find(m=>m.label===detKey);
  const isCompleted=curM2&&curM2.badge==="completed";
  if(isCompleted){_bbbSubTab="highlights"; _bbbImportantOnly=true;}

  detPlaying=true; detPlayIdx=0;
  // Show pause button, loading state on active btn
  const pr=document.getElementById("ssPauseRow"); if(pr) pr.style.display="block";
  if(btnEl) btnEl.classList.add("loading");
  document.getElementById("ssCommStatus").textContent="▶";
  // Switch to BBB tab and render
  if(detTab!=="bbb"){
    detTab="bbb";
    document.querySelectorAll(".det-tab").forEach((t,i)=>t.classList.toggle("active",i===0));
  }
  renderDetBody();
  // Pre-fetch key moments with throttling (max 2 concurrent to avoid rate-limit failures)
  function _vtForType(type,i){return(type==="WICKET"||type==="SIX")?1:(type==="FOUR"||type==="FIFTY"||type==="HUNDRED")?0:i%2;}
  // Clear any pending prefetch queue from previous session
  _ttsQueue=[];
  d.bbb.forEach((entry,i)=>{
    const ck=detKey+":"+style+":kw:"+i;
    if(!_ttsCache[ck]){
      const txt=entry[style]||entry.dramatic||"";
      _enqueueTTS(ck,txt,_vtForType(entry.type,i));
    }
  });
  if(isCompleted){
    const ick="_hindi_intro_"+detKey;
    if(!_ttsCache[ick]) _fetchTTS("यार, मैच तो खत्म हो गया... lekin ruko! Ab suno is match ke best highlights!",0).then(u=>{_ttsCache[ick]=u;}).catch(()=>{});
    _playHindiIntro(myGen).then(()=>{if(myGen===_detGen&&detPlaying) advancePlay(myGen);});
  } else {
    advancePlay(myGen);
  }
}

async function _playHindiIntro(gen){
  try{
    if(gen!==_detGen||!detPlaying) return;
    const text="यार, मैच toh khatam ho gaya... lekin ruko! Ab suno is match ke best highlights!";
    const ck="_hindi_intro_"+detKey;
    if(!_ttsCache[ck]){
      document.getElementById("ssCommStatus").textContent="⏳";
      _ttsCache[ck]=await _fetchTTS(text,0);
    }
    if(gen!==_detGen||!detPlaying) return;
    document.getElementById("ssCommStatus").textContent="▶";
    await _playAudio(_ttsCache[ck], gen);
  }catch(e){ /* intro failed — skip straight to highlights */ }
}

async function advancePlay(gen){
  if(gen===undefined) gen=_detGen;
  if(gen!==_detGen||!detPlaying) return;
  const bbbList=_activeBBBList||matchDetails[detKey]?.bbb||[];
  if(detPlayIdx>=bbbList.length){stopDetailPlay();return;}
  const idx=detPlayIdx;
  const entry=bbbList[idx];
  // Skip innings separator markers silently
  if(entry._inningsSep){detPlayIdx++;advancePlay(gen);return;}
  // Use the selected style text for TTS
  const jText=entry._syn?"":entry[detStyle]||entry.dramatic||"";

  // Highlight current item (DOM is reversed — item 0 at bottom)
  const _bbbCont=document.getElementById("detBody");
  const allItems=document.querySelectorAll(".bbb-item");
  const domIdx=allItems.length-1-idx;
  allItems.forEach((el,di)=>{
    el.classList.remove("playing","done");
    if(di===domIdx){el.classList.add("playing");}
    else if(di>domIdx) el.classList.add("done");
  });
  // For completed matches: auto-scroll to current ball. For live: no scroll (handled separately).
  const allM3=[...matchData.live,...matchData.upcoming,...matchData.completed];
  const curM3=allM3.find(m=>m.label===detKey);
  if(curM3&&curM3.badge==="completed"&&allItems[domIdx]){
    allItems[domIdx].scrollIntoView({behavior:"smooth",block:"nearest"});
  }

  // Voice: Brad/Fenrir(1) for wickets & sixes, Jake/Puck(0) for fours & milestones
  const voiceIdx=(entry.type==="WICKET"||entry.type==="SIX")?1:(entry.type==="FOUR"||entry.type==="FIFTY"||entry.type==="HUNDRED")?0:idx%2;
  // Crowd noise intensity
  const crowdType=(entry.type==="WICKET"||entry.type==="SIX")?"big":(entry.type==="FOUR"||entry.type==="FIFTY"||entry.type==="HUNDRED")?"medium":"ambient";

  if(entry._syn){
    // Synthetic ball — speak the ball description via TTS
    const synCk=detKey+":syn:"+idx;
    document.getElementById("ssCommStatus").textContent="⏳";
    if(!_ttsCache[synCk]){
      try{
        _ttsCache[synCk]=await _fetchTTS(entry[detStyle]||entry.text,voiceIdx);
      }catch(e){
        if(gen!==_detGen||!detPlaying) return;
        _playCrowdNoise("ambient");
        await new Promise(r=>{detTimer=setTimeout(r,900);});
        if(gen===_detGen&&detPlaying&&detPlayIdx===idx){detPlayIdx++;advancePlay(gen);}
        return;
      }
    }
    if(gen!==_detGen||!detPlaying) return;
    document.getElementById("ssCommStatus").textContent="▶";
    _playCrowdNoise("ambient");
    if(detPlaying&&detPlayIdx===idx) await _playAudio(_ttsCache[synCk], gen);
  } else {
    // Key moment — use selected style text, Camb AI→Gemini
    const ck=_kwCacheKey(entry)||detKey+":"+detStyle+":adv:"+idx;
    if(!_ttsCache[ck]){
      const jEl=document.getElementById("bbbj"+domIdx);
      if(jEl) jEl.textContent="🎙️ Generating…";
      document.getElementById("ssCommStatus").textContent="⏳";
      try{
        _ttsCache[ck]=await _fetchTTS(jText||entry.text,voiceIdx);
        if(jEl) jEl.textContent="🎙️ "+jText;
      }catch(e){
        if(gen!==_detGen||!detPlaying) return;
        if(jEl) jEl.textContent="🎙️ "+jText;
        _playCrowdNoise(crowdType);
        await new Promise(r=>{detTimer=setTimeout(r,2000);});
        if(gen===_detGen&&detPlaying&&detPlayIdx===idx){detPlayIdx++;advancePlay(gen);}
        return;
      }
    }
    if(gen!==_detGen||!detPlaying) return;
    document.getElementById("ssCommStatus").textContent="▶";
    const activeBtn=document.querySelector(".ss-style-btn.active");
    if(activeBtn) activeBtn.classList.remove("loading");
    _playCrowdNoise(crowdType);
    if(detPlaying&&detPlayIdx===idx) await _playAudio(_ttsCache[ck], gen);
  }

  if(gen===_detGen&&detPlaying&&detPlayIdx===idx){
    detPlayIdx++;
    advancePlay(gen);
  }
}

// Helper — look up the kw cache for a key-moment entry
function _kwCacheKey(entry){
  const d=matchDetails[detKey];
  if(!d||!d.bbb) return null;
  const i=d.bbb.findIndex(b=>b.over===entry.over&&b.type===entry.type);
  return i>=0?detKey+":"+detStyle+":kw:"+i:null;
}

function stopDetailPlay(){
  detPlaying=false;
  _detGen++; // invalidate any running async chain
  try{if(window.speechSynthesis) speechSynthesis.cancel();}catch(e){}
  _stopLiveCommentary();
  if(detTimer){clearTimeout(detTimer);detTimer=null;}
  if(_currentAudio){try{_currentAudio.stop();}catch(e){try{_currentAudio.pause();}catch(e2){}}_currentAudio=null;}
  // Remove loading state but keep active highlight so user sees what style was selected
  document.querySelectorAll(".ss-style-btn").forEach(b=>b.classList.remove("loading"));
  document.getElementById("ssCommStatus").textContent="";
  const pr2=document.getElementById("ssPauseRow");
  if(pr2) pr2.style.display="none";
  document.querySelectorAll(".bbb-item").forEach(el=>el.classList.remove("playing","done"));
}

// ── LIVE BALL-BY-BALL COMMENTARY ENGINE ──
let _liveState={
  active:false, apiId:null, style:"dramatic",
  pollTimer:null, lastRuns:-1, lastWkts:-1, lastOvers:-1,
  entryCount:0, ballCount:0, team1:"", team2:"",
  lastBallCount:0  // tracks how many match_bbb balls seen; 0 = not yet loaded
};
let _ambientNode=null;
let _pollActive=false; // guard: prevent two concurrent polls
const _invalidApiIds=new Set(); // CricAPI IDs that returned "Invalid API request" — never retry
let _ballTimers=[]; // staggered virtual-delivery timers

// ── SPLIT ESPN SCORE DELTA INTO VIRTUAL DELIVERIES ───────────────────────
// ESPN updates every ~30s covering 1-4 actual deliveries.
// We split the delta into 1-3 virtual balls fired 3s apart so it
// FEELS like every-ball commentary rather than one chunk every 30s.
function _expandScoreDelta(rd,wd,totalRuns,totalWkts,overs,striker,bowler,style,vi0){
  // Cancel any pending virtual deliveries from last update
  _ballTimers.forEach(t=>clearTimeout(t)); _ballTimers=[];

  const seq=[]; // [{r, wd}]
  let rem=rd;

  // Wicket first (if any)
  if(wd>0){ seq.push({r:0,wd:1}); }

  // Distribute runs in cricket-natural chunks (at most 4 virtual balls)
  while(rem>0&&seq.length<4){
    if(rem>=6&&seq.length<3){ seq.push({r:6}); rem-=6; }
    else if(rem>=4&&seq.length<3){ seq.push({r:4}); rem-=4; }
    else if(rem>=3&&seq.length<4){ seq.push({r:3}); rem-=3; }
    else if(rem>=2){ seq.push({r:2}); rem-=2; }
    else{ seq.push({r:1}); rem-=1; }
  }
  if(rem>0&&seq.length>0) seq[seq.length-1].r+=rem; // absorb leftover
  if(seq.length===0) seq.push({r:0}); // dot ball if nothing

  // Running score as we simulate each virtual delivery
  let simRuns=totalRuns-rd;
  let simWkts=totalWkts-wd;

  seq.forEach((ball,idx)=>{
    simRuns+=ball.r; simWkts+=(ball.wd||0);
    const capRuns=simRuns, capWkts=simWkts, capOv=overs;
    const t=setTimeout(()=>{
      if(!_liveState.active) return;
      const ev=_buildLiveEvent(ball.r,ball.wd||0,capRuns,capWkts,capOv,striker,bowler);
      if(!ev) return;
      let cText=ev[style]||ev.dramatic;
      // Every 2 balls: inject score announcement
      _liveState.ballCount++;
      if(_liveState.ballCount%2===0){
        const bt=striker&&striker.length<6?striker:_liveState.team1;
        cText+=" — "+capOv.toFixed(1)+" overs ke baad, "+bt+" "+capRuns+" for "+capWkts+".";
      }
      const isBig=ev.type==="WICKET"||ev.type==="SIX";
      const isMed=ev.type==="FOUR"||ball.r>=5;
      _burstCrowd(isBig?"big":isMed?"medium":"small");
      _addLiveFeedEntry(ev.type,ev.text,cText);
      const voiceIdx=isBig?1:(ev.type==="FOUR"?0:vi0%2);
      _liveState.entryCount++;
      const ck="live:"+ev.type+":"+capRuns+":"+capWkts;
      _fetchTTS(cText,voiceIdx).then(u=>{ if(u){ _ttsCache[ck]=u; _playAudio(u); } }).catch(()=>{});
    }, idx*3200); // 3.2s between each virtual delivery
    _ballTimers.push(t);
  });
}

// Continuous low-level stadium buzz — loops while match is live
function _startAmbientCrowd(){
  try{
    if(!_audioCtx||_ambientNode) return;
    if(_audioCtx.state==="suspended") _audioCtx.resume();
    const ctx=_audioCtx;
    const dur=3.0;
    const bufSize=Math.ceil(ctx.sampleRate*dur);
    const buf=ctx.createBuffer(2,bufSize,ctx.sampleRate);
    for(let ch=0;ch<2;ch++){
      const data=buf.getChannelData(ch);
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for(let i=0;i<bufSize;i++){
        const wh=Math.random()*2-1;
        b0=0.99886*b0+wh*0.0555179; b1=0.99332*b1+wh*0.0750759;
        b2=0.96900*b2+wh*0.1538520; b3=0.86650*b3+wh*0.3104856;
        b4=0.55000*b4+wh*0.5329522; b5=-0.7616*b5-wh*0.0168980;
        data[i]=(b0+b1+b2+b3+b4+b5+b6+wh*0.5362)/7;
        b6=wh*0.115926;
      }
    }
    const src=ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    const bp=ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=700; bp.Q.value=0.4;
    const gain=ctx.createGain(); gain.gain.value=0.04; // very low — just background murmur
    src.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
    src.start(); _ambientNode={src,gain};
  }catch(e){}
}
function _stopAmbientCrowd(){
  try{ if(_ambientNode){_ambientNode.src.stop();_ambientNode=null;} }catch(e){_ambientNode=null;}
}
// Layered crowd burst on top of ambient — type: "big","medium","small"
function _burstCrowd(type){
  _playCrowdNoise(type==="big"?"big":type==="medium"?"medium":"ambient");
}

function _startLiveCommentary(matchObj, style){
  _stopLiveCommentary();
  _liveState={
    active:true, apiId:matchObj.apiId, style:style||"dramatic",
    pollTimer:null, lastRuns:-1, lastWkts:-1, lastOvers:-1,
    entryCount:0, ballCount:0, team1:matchObj.team1.name, team2:matchObj.team2.name
  };
  document.getElementById("ssCommStatus").textContent="🔴";
  const btn=document.querySelector(".ss-style-btn.active");
  if(btn) btn.classList.add("loading");
  detTab="bbb";
  document.querySelectorAll(".det-tab").forEach((t,i)=>t.classList.toggle("active",i===0));
  // Only set innerHTML if live feed doesn't already exist (renderBBB may have created it)
  if(!document.getElementById("liveFeed")){
    document.getElementById("detBody").innerHTML=
      '<div id="liveFeed" style="display:flex;flex-direction:column;gap:10px;padding:12px"></div>'+
      '<div id="liveWaiting" style="padding:24px;text-align:center;color:#888;font-size:14px">🔴 Connecting to live feed…</div>';
  }
  _startAmbientCrowd();

  // Immediately show current known score as a status entry (no blank BBB on open)
  try{
    const feed=document.getElementById("liveFeed");
    if(feed){
      const t1s=matchObj.team1.score,t1w=matchObj.team1.wkts,t1o=matchObj.team1.overs;
      const t2s=matchObj.team2.score,t2w=matchObj.team2.wkts,t2o=matchObj.team2.overs;
      const hasT1=t1s&&parseInt(t1s)>=0, hasT2=t2s&&parseInt(t2s)>=0;
      if(hasT1||hasT2){
        const div=document.createElement("div");
        div.className="bbb-entry done";
        div.style.cssText="opacity:0.7;border-left:3px solid #1e3a5f;background:#07101a;margin-bottom:4px";
        div.innerHTML="<div class='bbb-meta'><span class='bbb-badge NORMAL'>MATCH IN PROGRESS</span></div>"
          +"<div class='bbb-text'>"
          +(hasT1?matchObj.team1.name+" "+t1s+" for "+t1w+" ("+t1o+")":(matchObj.team1.name+" yet to bat"))
          +" &nbsp;·&nbsp; "
          +(hasT2?matchObj.team2.name+" "+t2s+" for "+t2w+" ("+t2o+")":(matchObj.team2.name+" yet to bat"))
          +"</div>"
          +"<div class='bbb-jaffa' style='opacity:0.6'>🎙️ Match chal raha hai — ball-by-ball updates aa rahe hain…</div>";
        feed.appendChild(div);
      }
    }
  }catch(e){}

  if(matchObj.apiId) _preloadLiveBBB(matchObj.apiId); // async — renders past deliveries immediately
  _pollLiveCommentary();
}

function _stopLiveCommentary(){
  _liveState.active=false;
  _pollActive=false;
  if(_liveState.pollTimer){clearTimeout(_liveState.pollTimer);_liveState.pollTimer=null;}
  _ballTimers.forEach(t=>clearTimeout(t)); _ballTimers=[];
  if(_currentAudio){try{_currentAudio.pause();}catch(e){}_currentAudio=null;}
  _stopAmbientCrowd();
  try{speechSynthesis.cancel();}catch(e){}
  document.getElementById("ssCommStatus").textContent="";
  document.querySelectorAll(".ss-style-btn").forEach(b=>b.classList.remove("loading"));
}

async function _pollLiveCommentary(){
  if(!_liveState.active||_pollActive) return;
  _pollActive=true;
  try{
    let runs=0, wkts=0, overs=0, striker="", bowler="", matchEnded=false;
    let t1runs=null,t1wkts=null,t1overs=null,t2runs=null,t2wkts=null,t2overs=null;

    if(_liveState.apiId){
      // Skip if this ID was previously flagged as invalid — saves API calls
      if(_invalidApiIds.has(_liveState.apiId)){
        _liveState.apiId=null; // fall through to ESPN mode
      }
    }
    if(_liveState.apiId){
      const r=await fetch(_cricketURL("match",{id:_liveState.apiId}));
      const json=await r.json();
      // Detect "Invalid API request" — blacklist this ID so we never call it again
      if(json.status==="failure"||(typeof json.status==="string"&&json.status.toLowerCase().includes("invalid"))){
        console.warn("CricAPI: invalid match ID, blacklisting:",_liveState.apiId);
        _invalidApiIds.add(_liveState.apiId);
        _liveState.apiId=null; // fall through to ESPN mode on next poll
        throw new Error("invalid match id — falling back to ESPN");
      }
      if(json.status!=="success"||!json.data) throw new Error("cricapi no data");
      const md=json.data;
      const scores=md.score||[];
      const inn=scores[scores.length-1]||{};
      runs=inn.r||0; wkts=inn.w||0; overs=parseFloat(inn.o)||0;
      striker=md.striker?.name||md.currentBatsmen?.[0]?.name||
              md.batsmanRuns?.[0]?.batName||md.batTeamDetails?.batsmenData?.[0]?.batName||"";
      bowler=md.bowler?.name||md.currentBowler?.name||md.bowlerRuns?.[0]?.bowlName||"";
      matchEnded=!!md.matchEnded;
      if(scores[0]){t1runs=scores[0].r;t1wkts=scores[0].w;t1overs=scores[0].o;}
      if(scores[1]){t2runs=scores[1].r;t2wkts=scores[1].w;t2overs=scores[1].o;}
    } else {
      const all=[...matchData.live,...matchData.upcoming,...matchData.completed];
      const m=all.find(x=>x.label===detKey);
      if(!m) throw new Error("match not found in matchData");
      const o1=parseFloat(m.team1.overs)||0, o2=parseFloat(m.team2.overs)||0;
      const r1=parseInt(m.team1.score)||0, w1=parseInt(m.team1.wkts)||0;
      const r2=parseInt(m.team2.score)||0, w2=parseInt(m.team2.wkts)||0;
      t1runs=r1;t1wkts=w1;t1overs=o1;t2runs=r2;t2wkts=w2;t2overs=o2;
      if(o1>0&&o2>0){
        if(o2<o1){runs=r2;wkts=w2;overs=o2;striker=m.team2.name;bowler=m.team1.name;}
        else{runs=r1;wkts=w1;overs=o1;striker=m.team1.name;bowler=m.team2.name;}
      } else if(o1>0){runs=r1;wkts=w1;overs=o1;striker=m.team1.name;}
      else{runs=r2;wkts=w2;overs=o2;striker=m.team2.name;}
      matchEnded=m.badge==="completed";
      if(m.apiId) _liveState.apiId=m.apiId;
    }

    // ── Update header scorecard in detail screen immediately ──
    try{
      const all=[...matchData.live,...matchData.upcoming,...matchData.completed];
      const m=all.find(x=>x.label===detKey);
      if(m){
        const s1el=document.getElementById("ss1Score"),s2el=document.getElementById("ss2Score");
        const o1el=document.getElementById("ss1Overs"),o2el=document.getElementById("ss2Overs");
        if(s1el&&m.team1.score){s1el.textContent=m.team1.score+(m.team1.wkts!==undefined&&m.team1.wkts!==''?" for "+m.team1.wkts:"");}
        if(s2el&&m.team2.score){s2el.textContent=m.team2.score+(m.team2.wkts!==undefined&&m.team2.wkts!==''?" for "+m.team2.wkts:"");}
        if(o1el&&m.team1.overs) o1el.textContent=m.team1.overs;
        if(o2el&&m.team2.overs) o2el.textContent=m.team2.overs;
      }
      // If scorecard tab is open, re-render it live
      if(detTab==="scorecard") renderDetBody();
    }catch(e){}

    if(matchEnded){
      _stopLiveCommentary();
      const w=document.getElementById("liveWaiting");
      if(w) w.textContent="✅ Match over — loading full scorecard…";
      if(_liveState.apiId) setTimeout(()=>_autoFetchMatchDetails(detKey,_liveState.apiId),1000);
      return;
    }

    if(_liveState.lastRuns<0){
      _liveState.lastRuns=runs; _liveState.lastWkts=wkts; _liveState.lastOvers=overs;
    } else {
      // ── Detect innings change ──
      // When 2nd innings starts, the batting team resets to 0 runs.
      // lastRuns will be large (e.g. 261), runs will be 0-5 — delta is hugely negative.
      // Reset baseline and announce the new innings.
      if(runs < _liveState.lastRuns - 10){
        _liveState.lastRuns=runs; _liveState.lastWkts=wkts; _liveState.lastOvers=overs;
        _liveState.ballCount=0;
        const battingNow=striker||_liveState.team2||"dusri team";
        const innText="🏏 Naya innings shuru! "+battingNow+" ab batting karega. Target hai — kya hoga aaj?";
        _addLiveFeedEntry("NORMAL","🏏 New innings begins!",innText);
        _fetchTTS(innText,0).then(u=>{if(u)_playAudio(u);}).catch(()=>{});
        _burstCrowd("medium");
      }
      const rd=runs-_liveState.lastRuns;
      const wd=wkts-_liveState.lastWkts;
      if(wd>0||rd>0){
        _liveState.lastRuns=runs; _liveState.lastWkts=wkts; _liveState.lastOvers=overs;

        // If CricAPI available, try to get real ball data for first delivery — else pure synthetic
        let realFirstBall=null;
        if(_liveState.apiId){
          try{ realFirstBall=await _getLatestBall(_liveState.apiId); }catch(e){}
        }

        if(realFirstBall){
          // Real delivery: single accurate event
          const ev=_buildRealBallEvent(realFirstBall,runs,wkts,overs);
          if(ev){
            _liveState.ballCount++;
            let cText=ev[_liveState.style]||ev.dramatic;
            if(_liveState.ballCount%2===0){
              const bt=striker&&striker.length<6?striker:_liveState.team1;
              cText+=" — "+overs.toFixed(1)+" overs ke baad, "+bt+" "+runs+" for "+wkts+".";
            }
            const isBig=ev.type==="WICKET"||ev.type==="SIX";
            const isMed=ev.type==="FOUR"||rd>=5;
            _burstCrowd(isBig?"big":isMed?"medium":"small");
            _addLiveFeedEntry(ev.type,ev.text,cText);
            const vi=isBig?1:(ev.type==="FOUR"?0:_liveState.entryCount%2);
            _liveState.entryCount++;
            const ck="live:"+ev.type+":"+runs+":"+wkts;
            _fetchTTS(cText,vi).then(u=>{ if(u){ _ttsCache[ck]=u; _playAudio(u); } }).catch(()=>{});
          }
        } else {
          // ESPN-only: expand delta into 1-3 virtual deliveries for every-ball feel
          _expandScoreDelta(rd,wd,runs,wkts,overs,striker,bowler,
            _liveState.style, _liveState.entryCount);
          // Advance entryCount by estimated deliveries
          _liveState.entryCount+=Math.max(1,Math.ceil((rd||1)/3));
        }
      }
    }
    const w=document.getElementById("liveWaiting");
    if(w) w.textContent="🔴 "+runs+" for "+wkts+" ("+(overs||0).toFixed(1)+" ov) · Listening for next delivery…";
  }catch(e){ console.warn("Live poll error:",e); }
  finally{ _pollActive=false; }
  // Always reschedule — 12s via CricAPI, 30s via ESPN fallback
  if(_liveState.active){
    if(_liveState.pollTimer) clearTimeout(_liveState.pollTimer);
    _liveState.pollTimer=setTimeout(_pollLiveCommentary, _liveState.apiId?12000:30000);
  }
}

function _buildLiveEvent(rd,wd,runs,wkts,overs,striker,bowler){
  const score=runs+" for "+wkts+" ("+overs.toFixed(1)+" ov)";
  const s=striker?striker.split(" ").pop():_liveState.team1;
  const b=bowler?bowler.split(" ").pop():"";
  const bat=_liveState.team1, bowl=_liveState.team2;

  // Milestone check — team crosses 50/100/150/200
  const prev=_liveState.lastRuns;
  const milestone=[50,100,150,200].find(m=>prev<m&&runs>=m);

  if(wd>0){
    const dramatic="WICKET! WICKET! "+s+" ka wicket gir gaya! "+(b?b+" ne tod diya! ":"")+"Kya pal yaar! Stadium mein sannata! "+score;
    const funny="Ohhh nooo! "+s+" chalte bane! "+(b?b+" ji mubarak ho! ":"")+"Ab agli team ko bhi yahi hoga! "+score;
    const analytical="Wicket fell at "+score+". "+(b?"Bowler: "+b+". ":"")+"Key dismissal — "+bat+" ke liye pressure badhega.";
    return{type:"WICKET", text:"WICKET! "+(striker||"Batter")+" dismissed! "+score,
      dramatic, funny, analytical};
  } else if(rd>=6){
    const dramatic="CHHA! MAXIMUM! "+s+" ne zor se maar diya! Gayi ball, bahar! Stadium jhoom utha! "+score;
    const funny="Bhai bhai bhai! "+s+" ne toh ball ko videsh bhej diya! "+score+" — kamaal hai!";
    const analytical="SIX! "+rd+" runs off that delivery. "+bat+" building big — "+score;
    return{type:"SIX", text:"SIX! MAXIMUM! "+score, dramatic, funny, analytical};
  } else if(rd>=5){
    const dramatic="PAANCH RUN! Wah! "+s+" ne acchi shot lagayi! "+score;
    const funny="Paanch run! Nahi nahi chaar chahiye tha lekin paanch bhi chalega! "+score;
    const analytical="5 runs off that — good running between wickets. "+score;
    return{type:"FOUR", text:"5 runs! "+score, dramatic, funny, analytical};
  } else if(rd>=4){
    const dramatic="CHAAR! BOUNDARY! "+s+" ne gap dhundh liya! Fielder kuch nahi kar saka! "+score;
    const funny="Chaar! "+s+" ne aise maara jaise lunch break ke baad fresh energy aa gayi! "+score;
    const analytical="FOUR! Clean boundary — well timed by "+(striker||bat)+". "+score;
    return{type:"FOUR", text:"FOUR! Boundary! "+score, dramatic, funny, analytical};
  } else if(milestone){
    const dramatic=bat+" ne "+milestone+" ka milestone chhua! "+score+" — waah kya innings hai!";
    const funny=bat+" "+milestone+" pe pahunch gaye! Cake kahan hai yaar? "+score;
    const analytical=bat+" reach "+milestone+" runs. Good platform built. "+score;
    return{type:"MILESTONE", text:bat+" reach "+milestone+"! "+score, dramatic, funny, analytical};
  } else if(rd===3){
    const t="TEEN RUN! "+s+" ne achi running ki. "+score+" — momentum banega!";
    return{type:"NORMAL", text:"3 runs. "+score, dramatic:t, funny:t, analytical:t};
  } else if(rd===2){
    const t="DO RUN! "+s+" ne samajhdaari se khela. "+score;
    return{type:"NORMAL", text:"2 runs. "+score, dramatic:t, funny:t, analytical:t};
  } else if(rd===1){
    const t="Ek run. "+s+" strike rotate kar raha hai. "+score;
    return{type:"NORMAL", text:"1 run. "+score, dramatic:t, funny:t, analytical:t};
  }
  return null;
}

// ── GET LATEST REAL BALL from CricAPI match_bbb ─────────────────────────────
// Returns the newest unseen ball, or null if unavailable / no new ball
async function _getLatestBall(apiId){
  if(_invalidApiIds.has(apiId)) return null; // don't retry blacklisted IDs
  const r=await fetch(_cricketURL("match_bbb",{id:apiId}));
  if(!r.ok) return null;
  const json=await r.json();
  if(json.status==="failure"||(typeof json.status==="string"&&json.status.toLowerCase().includes("invalid"))){
    _invalidApiIds.add(apiId); return null;
  }
  if(json.status!=="success"||!Array.isArray(json.data?.bbb)||!json.data.bbb.length) return null;
  const balls=json.data.bbb;
  // Detect new balls since last seen
  const prev=_liveState.lastBallCount||0;
  _liveState.lastBallCount=balls.length;
  if(balls.length>prev){
    // Return the most recent new ball
    return balls[balls.length-1];
  }
  // No new ball index yet — return last ball anyway so commentary is real, not synthetic
  return balls[balls.length-1];
}

// ── BUILD ACCURATE COMMENTARY from a real CricAPI match_bbb ball object ─────
function _buildRealBallEvent(ball,runs,wkts,overs){
  const r=parseInt(ball.r||0);
  const rt=(ball.runType||ball.type||"").toUpperCase();
  const isWicket=rt==="WICKET"||rt==="W"||rt==="OUT"||(ball.howOut&&ball.howOut!=="not out"&&ball.howOut!=="");
  const isSix=!isWicket&&(rt==="SIX"||r>=6);
  const isFour=!isWicket&&!isSix&&(rt==="FOUR"||r===4);
  const score=runs+" for "+wkts+" ("+(overs||0).toFixed(1)+" ov)";
  const batter=ball.batsmanName||ball.batsman||_liveState.team1||"Batter";
  const bowler=ball.bowlerName||ball.bowler||_liveState.team2||"Bowler";
  const last=batter.split(" ").pop();
  const bLast=bowler.split(" ").pop();
  const ov=ball.over||ball.overs||overs||"";
  if(isWicket){
    const how=ball.howOut||ball.dismissal||"dismissed";
    return{type:"WICKET",
      text:"Over "+ov+": "+batter+" OUT! "+how+" — "+bowler+". "+score,
      dramatic:"WICKET! WICKET! "+last+" OUT! "+bLast+" ne tod diya! "+how+"! Stadium mein sannata! "+score,
      funny:last+" chalte bane! "+bLast+" ji mubarak ho! Kya bowling! "+score,
      analytical:batter+" out — "+how+", bowler "+bowler+". Over "+ov+". "+score+". Key dismissal."};
  } else if(isSix){
    return{type:"SIX",
      text:"Over "+ov+": "+batter+" — SIX off "+bowler+"! Maximum! "+score,
      dramatic:"CHHA! MAXIMUM! "+last+" ne "+bLast+" ko stadium ke bahar bhej diya! Kya shot tha — crowd standing! "+score,
      funny:last+" ne "+bLast+" ki ball ko address change karwa di! SIX! Ball abhi bhi ja rahi hai! "+score,
      analytical:"SIX off "+bowler+" by "+batter+". Over "+ov+". "+score+". Powerful hitting."};
  } else if(isFour){
    return{type:"FOUR",
      text:"Over "+ov+": "+batter+" — FOUR off "+bowler+"! "+score,
      dramatic:"CHAAR! "+last+" ne "+bLast+" ko boundary bheji! Kya timing — fielder kuch nahi kar saka! "+score,
      funny:last+" ne "+bLast+" ko FOUR maara — fielder ko pata bhi nahi chala! "+score,
      analytical:"FOUR off "+bowler+" by "+batter+". Over "+ov+". "+score+". Well timed."};
  } else if(r===0){
    return{type:"NORMAL",
      text:"Over "+ov+": Dot ball — "+last+" off "+bLast+". "+score,
      dramatic:"Dot ball! "+bLast+" ne roka "+last+" ko — koi run nahi. "+score,
      funny:"Dot! "+last+" ne try kiya, "+bLast+" ne nahi diya! "+score,
      analytical:"Dot ball. "+bowler+" bowling tight. "+score+"."};
  } else {
    const t=r===3?"TEEN RUN! "+last+" ne achi running ki! "+score:
             r===2?"DO RUN! "+last+" ne samajhdaari se khela. "+score:
             "Ek run. "+last+" strike rotate kar raha hai. "+score;
    return{type:"NORMAL",text:"Over "+ov+": "+r+" run"+(r!==1?"s":"")+" — "+batter+" off "+bowler+". "+score,
      dramatic:t,funny:t,analytical:r+" run off "+bowler+" by "+batter+". Over "+ov+". "+score+"."};
  }
}

// ── PRELOAD LIVE BBB — fetches recent deliveries when user opens a live match ─
// Solves "BBB empty on open" — shows last 20 actual deliveries immediately
async function _preloadLiveBBB(apiId){
  if(_invalidApiIds.has(apiId)) return;
  try{
    const r=await fetch(_cricketURL("match_bbb",{id:apiId}));
    if(!r.ok) return;
    const json=await r.json();
    if(json.status!=="success"||!Array.isArray(json.data?.bbb)||!json.data.bbb.length) return;
    const balls=json.data.bbb;
    _liveState.lastBallCount=balls.length;

    // Set lastRuns/lastWkts/lastOvers from the most recent ball so we don't re-fire
    const lb=balls[balls.length-1];
    const curRuns=parseInt(lb.totalRuns||lb.innings_total||0);
    const curWkts=parseInt(lb.totalWickets||0);
    const curOvers=parseFloat(lb.over||lb.overs||0);
    if(curRuns>0&&_liveState.lastRuns<0){
      _liveState.lastRuns=curRuns; _liveState.lastWkts=curWkts; _liveState.lastOvers=curOvers;
    }

    const feed=document.getElementById("liveFeed");
    if(!feed) return;

    // Render last 20 balls as historical entries (muted style)
    const recent=balls.slice(-20);
    recent.forEach(ball=>{
      const r=parseInt(ball.r||0);
      const rt=(ball.runType||ball.type||"").toUpperCase();
      const isWkt=rt==="WICKET"||rt==="W"||rt==="OUT"||(ball.howOut&&ball.howOut!=="not out"&&ball.howOut!=="");
      const isSix=!isWkt&&(rt==="SIX"||r>=6);
      const isFour=!isWkt&&!isSix&&(rt==="FOUR"||r===4);
      const evType=isWkt?"WICKET":isSix?"SIX":isFour?"FOUR":"NORMAL";
      const batter=ball.batsmanName||ball.batsman||"?";
      const bowler=ball.bowlerName||ball.bowler||"?";
      const last=batter.split(" ").pop();
      const bLast=bowler.split(" ").pop();
      const ov=ball.over||ball.overs||"?";
      const runsTotal=ball.totalRuns||ball.innings_total||"";
      const wktsTotal=ball.totalWickets||"";
      const scoreStr=runsTotal?(runsTotal+" for "+wktsTotal):"";
      let text="",commentary="";
      if(isWkt){
        text="Over "+ov+": "+batter+" OUT! "+(ball.howOut||"dismissed")+" — "+bowler+(scoreStr?" · "+scoreStr:"");
        commentary="WICKET! "+last+" OUT — "+bLast+" ne liya! "+(ball.howOut||"")+" "+(scoreStr||"");
      } else if(isSix){
        text="Over "+ov+": "+batter+" hits "+bowler+" for SIX!"+(scoreStr?" · "+scoreStr:"");
        commentary="CHHA! "+last+" ne "+bLast+" ko bahar bheja! "+(scoreStr||"");
      } else if(isFour){
        text="Over "+ov+": "+batter+" — FOUR off "+bowler+"."+(scoreStr?" · "+scoreStr:"");
        commentary="CHAAR! "+last+" ne "+bLast+" ko boundary bheji! "+(scoreStr||"");
      } else {
        text="Over "+ov+": "+r+" run"+(r!==1?"s":"")+" — "+last+" off "+bLast+(scoreStr?" · "+scoreStr:"");
        commentary=r===0?"Dot ball. "+bLast+" ne roka "+last+". "+(scoreStr||""):
                   r===1?"Ek run. "+last+" strike rotate kar raha hai. "+(scoreStr||""):
                   r===2?"Do run. "+last+" ne samajhdaari se khela. "+(scoreStr||""):
                   "Teen run! "+last+" ki achi running. "+(scoreStr||"");
      }
      const div=document.createElement("div");
      div.className="bbb-entry done";
      div.style.cssText="opacity:0.65;border-left:3px solid #555;margin-left:4px";
      div.innerHTML="<div class='bbb-meta'><span class='bbb-badge "+evType+"'>"+evType+"</span>"
        +"<span style='opacity:0.6;font-size:11px;margin-left:6px'>Over "+ov+"</span></div>"
        +"<div class='bbb-text'>"+text+"</div>"
        +"<div class='bbb-jaffa' style='opacity:0.7'>🎙️ "+commentary+"</div>";
      feed.appendChild(div);
    });

    // Update waiting text with current score
    const w=document.getElementById("liveWaiting");
    if(w&&curRuns>=0){
      w.textContent="🔴 "+curRuns+" for "+curWkts+" ("+curOvers.toFixed(1)+" ov) · Listening for next delivery…";
    }
  }catch(e){ console.warn("_preloadLiveBBB error:",e); }
}

// Instant TTS via browser Web Speech API — zero latency, used for live commentary
function _speakNow(text, type){
  try{
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate = (type==="WICKET"||type==="SIX") ? 1.25 : 1.1;
    u.pitch = (type==="WICKET"||type==="SIX") ? 1.3 : 1.05;
    u.volume = 1.0;
    // Pick best available voice
    const voices=speechSynthesis.getVoices();
    const pick=voices.find(v=>/en/i.test(v.lang)&&/(google|daniel|alex|rishi|moira|samantha)/i.test(v.name))
              ||voices.find(v=>/en.*in/i.test(v.lang))
              ||voices.find(v=>/en/i.test(v.lang));
    if(pick) u.voice=pick;
    speechSynthesis.speak(u);
  }catch(e){}
}
