// ── AUTO-FETCH BBB / SCORECARD FOR FUTURE MATCHES ──
// When a match has an apiId but no hardcoded matchDetails, build them from cricapi scorecard.
// Also attempts to fetch ball-by-ball data from CricAPI's match_bbb endpoint.
async function _autoFetchMatchDetails(label, apiId){
  document.getElementById("detBody").innerHTML="<div style='padding:40px;text-align:center;color:#888'>⏳ Loading match data…</div>";
  try{
    const r=await fetch(_cricketURL("matchScorecard",{id:apiId}));
    if(!r.ok) throw new Error("HTTP "+r.status);
    const json=await r.json();
    if(json.status!=="success"||!json.data) throw new Error("No data");
    const sc=json.data;
    const innings=sc.scorecard||[];
    const built={result:sc.status||"",bbb:[],bat1:null,bat2:null,t1:{score:"",wkts:"",overs:"",win:false},t2:{score:"",wkts:"",overs:"",win:false},
      _matchType:sc.matchType||sc.matchFormat||sc.matchDesc||""};

    innings.forEach((inn,innIdx)=>{
      const batting=inn.batting||[];
      const bowling=inn.bowling||[];
      const innLabel=inn.inning||("Innings "+(innIdx+1));
      const rows=batting.map(b=>({
        n:b.batsman?.name||b.name||"?",
        d:b["dismissal-text"]||b.dismissal||(b["out/not_out"]==="not out"?"not out":""),
        r:b.r||0,b:b.b||0,f:b["4s"]||0,s:b["6s"]||0,
        no:(b["out/not_out"]==="not out")||false
      }));
      const bowlRows=bowling.map(bw=>({
        n:bw.bowler?.name||bw.name||"?",
        o:bw.o||"0",r:bw.r||0,w:bw.w||0,eco:bw.eco||"-"
      }));
      const totalRuns=rows.reduce((a,b)=>a+b.r,0);
      const totalWkts=rows.filter(b=>!b.no).length;
      const batObj={team:innLabel.replace(/ Inning.*$/,"").replace(/ Innings.*$/,""),
        total:totalRuns+"/"+totalWkts,overs:inn.overs||"",rows,bowl:bowlRows};
      if(innIdx===0){built.bat1=batObj;built.t1.score=String(totalRuns);built.t1.wkts=String(totalWkts);built.t1.overs=(inn.overs||"")+" ov";}
      else{built.bat2=batObj;built.t2.score=String(totalRuns);built.t2.wkts=String(totalWkts);built.t2.overs=(inn.overs||"")+" ov";}

      // Auto-generate BBB highlights from batting milestones
      const _shotTypes=["cover drive","pull shot","cut through point","flick off pads","sweep through mid-wicket","reverse sweep","slog-sweep over long-on","straight drive"];
      const _sixDesc=["mid-wicket ke upar","long-on ke paar","deep square leg ki taraf","straight over the bowler","extra cover ke upar"];
      batting.forEach((b,bi)=>{
        const runs=b.r||0,balls=b.b||0,sixes=b["6s"]||0,fours=b["4s"]||0;
        const name=b.batsman?.name||b.name||"Batter";
        const last=name.split(" ").pop();
        const sr=balls>0?Math.round(runs/balls*100):0;
        const dis=b["dismissal-text"]||b.dismissal||"";
        if(runs>=100){
          built.bbb.push({over:innLabel,type:"HUNDRED",
            text:`${name} scores a magnificent CENTURY — ${runs} off ${balls} balls! ${fours}x4, ${sixes}x6. SR ${sr}.`,
            dramatic:`CENTURY! ${last} ne SAINKAD laga di! ${runs} runs off ${balls} balls — ${fours} chauke, ${sixes} chhakke! SR ${sr}. Yeh toh legend performance hai yaar! Team ke liye kitna bada knock!`,
            funny:`${last} ne CENTURY maar di! ${runs} off ${balls}. ${sixes} sixes ke baad bhi nahi ruka — bhai, bowlers toh resign kar lete hain aajkal!`,
            analytical:`${name} ne CENTURY jad di — ${runs} off ${balls}, SR ${sr}. ${fours} chauke, ${sixes} chhakke. ${dis?'Out hue '+runs+' pe — par innings ne team ko strong position mein rakha.':'Abhi bhi crease pe hain.'} Match-defining knock.`,
            score:`${batObj.team} ${runs}(${balls})`});
        } else if(runs>=50){
          built.bbb.push({over:innLabel,type:"FIFTY",
            text:`${name} brings up a fine fifty — ${runs} off ${balls} balls, ${fours}x4, ${sixes}x6.`,
            dramatic:`FIFTY! ${last} ne half-century maar di! ${runs} off ${balls} — kya innings chal raha hai! ${fours} chauke, ${sixes} chhakke. SR ${sr}. Team ko zaroorat thi, ${last} ne deliver kiya!`,
            funny:`${last} ne fifty laga di! ${runs} off ${balls} balls. ${sixes} SIX bhi maare — bhai, ek kaam kar raha hai aaj toh! Kya concentration hai!`,
            analytical:`${name} ne fifty maari — ${runs} off ${balls}, SR ${sr}. ${fours} chauke, ${sixes} chhakke. ${dis?runs+' pe out hue — par knock impactful tha.':'Crease pe hain.'} Achha strike rate pe batting.`,
            score:`${batObj.team} ${runs}(${balls})`});
        }
        // Add FOUR event for batsmen with 2+ fours (pick best boundary)
        if(fours>=2&&runs>=20){
          const shot=_shotTypes[(bi+fours)%_shotTypes.length];
          built.bbb.push({over:innLabel,type:"FOUR",
            text:`${name} hits a beautiful ${shot} for FOUR! ${fours} fours in this knock of ${runs} off ${balls}.`,
            dramatic:`CHAAR! ${last} ne ${shot} maar diya — kya timing hai! ${fours} fours is innings mein. ${batObj.team} running!`,
            funny:`${last} ne ${shot} maar di — fielder ne dekhte raha! ${fours} chauke ho gaye is innings mein. Kya class hai yaar!`,
            analytical:`${name} ne ${shot} maar diya — is ${runs} run ki knock mein ${fours} chaukon mein se ek. SR ${sr}. Bowling ke khilaf sahi shot chunaav.`,
            score:`${batObj.team} ${runs}(${balls})`});
        }
        // Add SIX event for 1-2 sixes
        if(sixes>=1&&sixes<=2&&runs>=15){
          const sixDir=_sixDesc[(bi+sixes)%_sixDesc.length];
          built.bbb.push({over:innLabel,type:"SIX",
            text:`${name} launches one for SIX! ${sixDir}! ${sixes} six${sixes>1?'es':''} in this knock of ${runs} off ${balls}.`,
            dramatic:`CHHA! ${last} ne maar diya — ${sixDir}! ${sixes} maximum${sixes>1?'s':''} in this innings. Crowd jhoom utha!`,
            funny:`${last} ne SIX maar diya — ${sixDir}! Ball wapas aa rahi hai abhi bhi! ${sixes} chhakke this innings. Kamaal ho gaya!`,
            analytical:`${name} ne SIX maar diya — ${sixDir}. Is knock mein ${sixes} chhakke. ${runs} off ${balls}, SR ${sr}. Impactful batting.`,
            score:`${batObj.team} ${runs}(${balls})`});
        }
        // 3+ sixes already covered above for 50+, but handle for <50 run scorers
        if(sixes>=3&&runs<50){
          built.bbb.push({over:innLabel,type:"SIX",
            text:`${name} smashes ${sixes} sixes in this knock — ${runs} off ${balls}, pure power!`,
            dramatic:`${sixes} SIXES! ${last} ne bowlers ko stadium ke bahar bhej diya! ${runs} off ${balls}, SR ${sr}. Kya power hai bhai! Crowd on its feet!`,
            funny:`${last} ne ${sixes} SIX maare — ${runs} runs mein hi! SR ${sr}. Bhai, boundaries ka kya — directly stands mein bhejta hai yeh!`,
            analytical:`${name} — ${runs} off ${balls} mein ${sixes} chhakke. SR ${sr}. Aggressive batter — match ka tempo jaldi badal deta hai. Jokhim zyada, par reward bhi zyada.`,
            score:`${batObj.team} ${runs}(${balls})`});
        }
      });
      bowling.filter(bw=>(bw.w||0)>=2).forEach(bw=>{
        const bwName=bw.bowler?.name||bw.name||"Bowler";
        const bwLast=bwName.split(" ").pop();
        built.bbb.push({over:innLabel,type:"WICKET",
          text:`${bwName} — ${bw.w}/${bw.r} off ${bw.o} overs. Match-changing spell!`,
          dramatic:`${bwLast} ne ${bw.w} wicket liye — ${bw.w}/${bw.r} in ${bw.o} overs! Kya spell hai yaar! ${batObj.team} ke liye bada jhatka!`,
          funny:`${bwLast} ${bw.w} wicket leke muskuraa raha hai! ${bw.w}/${bw.r} — bhai, yeh toh ek hi over mein game palat deta hai!`,
          analytical:`${bwName} — ${bw.w} wicket, ${bw.r} run diye, ${bw.o} overs mein. Economy ${bw.eco||'-'}. Lagaataar pressure, sahi waqt pe zaroori wicket liye.`,
          score:`${batObj.team} ${bw.w}/${bw.r} (${bw.o})`});
      });
    });

    // NOTE: match_bbb enrichment removed — CricAPI's ball-by-ball data for completed
    // matches contained wrong player names (players who didn't play the match).
    // The synthetic BBB above (built from matchScorecard stats) is more accurate.

    if(built.bbb.length===0){
      const mt="Ek aur jabarjast match! Kya cricket tha yaar! "+(sc.status||"");
      built.bbb.push({over:"Match",type:"FOUR",
        text:sc.status||"Match completed.",
        dramatic:mt, funny:mt, analytical:mt,
        score:sc.name||""});
    }
    matchDetails[label]=built;
    renderDetBody();
    if(detPlaying) return;
    setTimeout(()=>startComm("dramatic",document.getElementById("ssBtnDramatic")),400);
  }catch(e){
    console.warn("Auto-fetch scorecard failed:",e);
    // For live matches: fall back to ESPN-based scorecard instead of showing error
    if(_liveState.active) renderDetBody();
    else document.getElementById("detBody").innerHTML="<div style='padding:40px;text-align:center;color:#888'>📡 Scorecard not available for this match.</div>";
  }
}

// ── LIVE SCORE FETCHING — routed through Cloudflare Worker proxy ──
// CRICKET_API_KEY is stored securely in the Worker's env vars, never in frontend
function _cricketURL(endpoint, params={}){
  const q=new URLSearchParams(params).toString();
  return PROXY+"/cricket/"+endpoint+(q?"?"+q:"");
}

// ── ESPN CRICINFO via Apify (through Cloudflare Worker proxy) ──
// Worker calls fingolfin/espn-cricinfo-scraper with your Apify token
// Must add APIFY_KEY secret to Cloudflare Worker settings.
async function _fetchEspnCricinfo(action, params={}){
  const r=await fetch(PROXY+"/apify/cricket",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action,...params})
  });
  if(!r.ok) throw new Error("ESPN Cricinfo proxy failed: "+r.status);
  const d=await r.json();
  if(d.error) throw new Error(d.error);
  return d.items||[];
}

// ── LIVE SCORES via ESPN Cricinfo (richer data, needs APIFY_KEY in Worker) ──
// The actor returns [{action, success, data:[...matches]}] — extract data array
async function _fetchEspnLiveScores(){
  try{
    const items=await _fetchEspnCricinfo("get_live_scores");
    if(!items||!items.length) return null;
    // Actor wraps results: items[0].data is the actual match array
    const matches=items[0]?.data||items;
    if(!Array.isArray(matches)||!matches.length) return null;
    return matches;
  }catch(e){
    console.warn("ESPN live scores failed:",e.message);
    return null;
  }
}

// ── CRICAPI SCORES — internal helper ──
// ONE call per poll to preserve the 1000/day budget.
// We alternate offsets: offset=0 first, offset=25 if no franchise league found.
// _cricapiOffset remembers which offset found IPL last time — avoids wasting calls.
let _cricapiOffset=25; // IPL 2026 is at offset=25; will auto-correct if found at 0
let _cricapiPollCount=0;
async function _fetchCricapiScores(){
  if(document.visibilityState==="hidden") return; // don't waste calls when tab is in background
  _cricapiPollCount++;

  // On the very first poll, fetch BOTH offsets so we don't miss IPL
  // After that, single call to save budget
  let allMatches=[];
  if(_cricapiPollCount===1){
    const [r0,r25]=await Promise.all([
      fetch(_cricketURL("currentMatches",{offset:0})),
      fetch(_cricketURL("currentMatches",{offset:25}))
    ]);
    const [d0,d25]=await Promise.all([r0.json(),r25.json()]);
    const m0=(d0.status==="success"&&Array.isArray(d0.data))?d0.data:[];
    const m25=(d25.status==="success"&&Array.isArray(d25.data))?d25.data:[];
    // Remember which offset has franchise league matches
    // Use both short ("ipl") and long ("indian premier league") forms + team name fallback
    const FRANCHISE_CHECK=["ipl","indian premier league","premier league","psl","bbl","cpl","sa20","ilt20","mlc","wpl"];
    const IPL_TEAM_CHECK=["royal challengers","chennai super kings","mumbai indians","kolkata knight riders","sunrisers","rajasthan royals","delhi capitals","punjab kings","gujarat titans","lucknow super giants"];
    const _hasFranchise=arr=>arr.some(m=>{
      const s=((m.name||"")+" "+(m.series||"")).toLowerCase();
      const t=((m.teams||[]).join(" ")).toLowerCase();
      return FRANCHISE_CHECK.some(l=>s.includes(l))||IPL_TEAM_CHECK.some(l=>t.includes(l));
    });
    const has0=_hasFranchise(m0), has25=_hasFranchise(m25);
    _cricapiOffset=has25?25:(has0?0:25); // default 25 if neither has franchise
    allMatches=[...m0,...m25];
  } else {
    // Ongoing polls: single offset call
    // Every 3rd poll, also check the other offset to catch matches that have shifted position
    const offsetToUse=(_cricapiPollCount%3===0)?(_cricapiOffset===25?0:25):_cricapiOffset;
    const r=await fetch(_cricketURL("currentMatches",{offset:offsetToUse}));
    const d=await r.json();
    allMatches=(d.status==="success"&&Array.isArray(d.data))?d.data:[];
    const FRANCHISE_CHECK2=["ipl","indian premier league","premier league","psl","bbl","cpl","sa20","ilt20","mlc","wpl"];
    const IPL_TEAM_CHECK2=["royal challengers","chennai super kings","mumbai indians","kolkata knight riders","sunrisers","rajasthan royals","delhi capitals","punjab kings","gujarat titans","lucknow super giants"];
    if(allMatches.some(m=>{
      const s=((m.name||"")+" "+(m.series||"")).toLowerCase();
      const t=((m.teams||[]).join(" ")).toLowerCase();
      return FRANCHISE_CHECK2.some(l=>s.includes(l))||IPL_TEAM_CHECK2.some(l=>t.includes(l));
    })) _cricapiOffset=offsetToUse;
  }

  if(!allMatches.length) return;
  const seen=new Set();
  const data={data:allMatches.filter(m=>{ if(seen.has(m.id)) return false; seen.add(m.id); return true; })};

    const all=[...matchData.live,...matchData.upcoming,...matchData.completed];
    let changed=false;

    // Map full IPL/international team names → abbreviations used in matchData
    const _ABBR={"Lucknow Super Giants":"LSG","Delhi Capitals":"DC","Gujarat Titans":"GT",
      "Punjab Kings":"PBKS","Chennai Super Kings":"CSK","Rajasthan Royals":"RR",
      "Mumbai Indians":"MI","Royal Challengers Bengaluru":"RCB","Royal Challengers Bangalore":"RCB",
      "Kolkata Knight Riders":"KKR","Sunrisers Hyderabad":"SRH","Rising Pune Supergiant":"RPS",
      "Pune Warriors India":"PWI","Deccan Chargers":"DC","Kochi Tuskers":"KTK"};
    function _norm(n){ return _ABBR[n]||n; }
    // Check if two name strings refer to the same team (handles abbr vs full name)
    function _namesMatch(a,b){
      const na=_norm(a).toLowerCase(), nb=_norm(b).toLowerCase();
      if(na===nb||na.includes(nb)||nb.includes(na)) return true;
      const aw=a.toLowerCase().split(/\s+/).filter(w=>w.length>3);
      return aw.some(w=>b.toLowerCase().includes(w));
    }

    // GUARDRAIL: validate match name is not blank/garbage
    const _validMatch=m=>m.teams&&m.teams.length>=2&&m.teams[0]&&m.teams[1];

    data.data.forEach(m=>{
      if(!_validMatch(m)) return;
      const t1n=m.teams[0], t2n=m.teams[1];
      const isLive=m.matchStarted&&!m.matchEnded;
      const isDone=m.matchEnded;
      const seriesStr=((m.name||"")+" "+(m.series||"")).toLowerCase();
      const teamsStr=(t1n+" "+t2n).toLowerCase();

      // No quality filter — show all matches returned by CricAPI

      // Find existing entry by team name match (preserves label so BBB still works)
      // Also check reversed order — CricAPI sometimes flips team1/team2 vs our hardcoded order
      const existing=all.find(e=>
        (_namesMatch(t1n,e.team1.name)&&_namesMatch(t2n,e.team2.name))||
        (_namesMatch(t1n,e.team2.name)&&_namesMatch(t2n,e.team1.name)));

      if(existing){
        existing.apiId=m.id;
        // If detail screen is open and live commentary is running in ESPN-fallback mode,
        // upgrade it to CricAPI mode now that we have the ID (12s polling, batsman/bowler names)
        if(isLive&&existing.badge==="live"&&detKey===existing.label&&_liveState.active&&!_liveState.apiId){
          _liveState.apiId=m.id;
        }
        // Only update score if API value looks valid (not 0/0 on a started match)
        const s1=m.score&&m.score.find(s=>s.inning&&_namesMatch(t1n,s.inning));
        const s2=m.score&&m.score.find(s=>s.inning&&_namesMatch(t2n,s.inning));
        if(s1&&(s1.r>0||s1.w>0)){existing.team1.score=String(s1.r);existing.team1.wkts=String(s1.w);existing.team1.overs=s1.o+" ov";}
        if(s2&&(s2.r>0||s2.w>0)){existing.team2.score=String(s2.r);existing.team2.wkts=String(s2.w);existing.team2.overs=s2.o+" ov";}
        if(isDone&&existing.badge!=="completed"){
          existing.badge="completed";
          existing.result="✅ "+(m.status||"Match completed");
          if(!existing.status||!existing.status.includes("hl-g")) existing.status="<span class=hl-g>"+(m.status||"Match completed")+"</span>";
          matchData.live=matchData.live.filter(x=>x!==existing);
          matchData.upcoming=matchData.upcoming.filter(x=>x!==existing);
          if(!matchData.completed.includes(existing)) matchData.completed.unshift(existing);
        } else if(isLive&&existing.badge!=="live"){
          existing.badge="live";
          matchData.upcoming=matchData.upcoming.filter(x=>x!==existing);
          matchData.completed=matchData.completed.filter(x=>x!==existing);
          if(!matchData.live.includes(existing)) matchData.live.unshift(existing);
        }
        if(m.status&&isLive) existing.status=m.status; // live status text OK to overwrite
        changed=true;
      } else if(isLive||(!existing&&!isDone)){
        // New match from API — add to appropriate list
        const s1=m.score&&m.score.find(s=>s.inning&&_namesMatch(t1n,s.inning));
        const s2=m.score&&m.score.find(s=>s.inning&&_namesMatch(t2n,s.inning));
        const newMatch={
          label:m.name||`${t1n} vs ${t2n}`, badge:isLive?"live":"upcoming", apiId:m.id,
          _matchType:m.matchType||m.matchFormat||"",
          team1:{flag:_teamFlag(t1n),name:_norm(t1n)||t1n,score:s1?String(s1.r):"",wkts:s1?String(s1.w):"",overs:s1?s1.o+" ov":""},
          team2:{flag:_teamFlag(t2n),name:_norm(t2n)||t2n,score:s2?String(s2.r):"",wkts:s2?String(s2.w):"",overs:s2?s2.o+" ov":""},
          status:m.status||(isLive?"🔴 LIVE":`🕖 ${m.dateTimeGMT||"Upcoming"}`),
          extra:m.venue?`📍 ${m.venue}`:"",result:"",listen:false
        };
        if(isLive) matchData.live.push(newMatch);
        else matchData.upcoming.push(newMatch);
        changed=true;
      }
    });

    // ── Auto-expire stale upcoming matches ──
    // CricAPI only returns matches for the next ~7 days. If an upcoming match
    // disappears from the feed entirely, it has either started or been cancelled.
    // After 2 polls without seeing it, move it from upcoming → completed.
    if(!matchData._seenIds) matchData._seenIds=new Map(); // label → last-seen poll count
    const seenThisPoll=new Set(data.data.map(m=>m.id));
    matchData.upcoming.forEach(m=>{
      if(!m.apiId) return; // hardcoded matches without apiId — skip
      if(seenThisPoll.has(m.apiId)){
        matchData._seenIds.set(m.label, _cricapiPollCount);
      } else {
        const lastSeen=matchData._seenIds.get(m.label)||0;
        // If not seen for 2+ polls (≥ ~6 min), it's probably started/done — move to completed
        if(_cricapiPollCount-lastSeen>=2){
          m.badge="completed";
          m.result=m.result||"✅ Match completed";
          matchData.upcoming=matchData.upcoming.filter(x=>x!==m);
          if(!matchData.completed.find(x=>x.label===m.label)) matchData.completed.unshift(m);
          changed=true;
        }
      }
    });

    if(changed) renderMatches(currentTab);
}

// ── MASTER LIVE SCORE FETCHER ──
// CricAPI fires first (fast, ~1-2s) for immediate data.
// ESPN Cricinfo fires simultaneously in background (authoritative, ~10-20s) and overrides when ready.
// Worker Apify timeout=20s — safe under Cloudflare's 30s wall-clock limit.
let _espnPending=false; // guard against stacked ESPN calls
async function fetchLiveScores(){
  // CricAPI: fast baseline, awaited so UI updates immediately
  try{ await _fetchCricapiScores(); }
  catch(e){ console.warn("CricAPI fetch failed:",e); }

  // ESPN Cricinfo: richer/more authoritative — fires in background, overrides CricAPI data on arrival
  // Skip if a prior ESPN call is still in flight (prevents stacking)
  if(_espnPending) return;
  _espnPending=true;
  _fetchEspnLiveScores().then(items=>{
    if(items&&items.length>0){
      _applyEspnToMatchData(items);
      console.log("ESPN Cricinfo enrichment ✓",items.length,"matches");
      // If live commentary is running in ESPN-fallback mode, wake it up immediately
      // instead of waiting for its own 30s timer — this is the latency fix
      if(_liveState.active&&!_liveState.apiId){
        if(_liveState.pollTimer){clearTimeout(_liveState.pollTimer);_liveState.pollTimer=null;}
        _pollLiveCommentary();
      }
    }
  }).catch(()=>{}).finally(()=>{ _espnPending=false; });
}

// Apply ESPN Cricinfo data to matchData.
// Actual ESPN scraper shape per item:
//   item.teams = [{team:{name,longName,abbreviation}, isLive, score, scoreInfo}, ...]
//   item.status = "Live" | "RESULT" | "{{MATCH_START_TIME}}" | "unknown"
//   item.venue.name, item.series.name, item.match_id
function _applyEspnToMatchData(items){
  const all=[...matchData.live,...matchData.upcoming,...matchData.completed];
  let changed=false;

  // Full name → abbreviation map
  const _ABBR={
    "Mumbai Indians":"MI","Delhi Capitals":"DC","Chennai Super Kings":"CSK",
    "Kolkata Knight Riders":"KKR","Sunrisers Hyderabad":"SRH","Rajasthan Royals":"RR",
    "Royal Challengers Bengaluru":"RCB","Royal Challengers Bangalore":"RCB",
    "Punjab Kings":"PBKS","Lucknow Super Giants":"LSG","Gujarat Titans":"GT",
    "Islamabad United":"IU","Lahore Qalandars":"LQ","Multan Sultans":"MS",
    "Peshawar Zalmi":"PZ","Quetta Gladiators":"QG","Karachi Kings":"KK","Rawalpindiz":"RWP"
  };
  function _abbr(n){ return _ABBR[n]||n; }

  // Match two team name strings — checks abbreviation, long name, partial word
  function _teamsMatch(espnName, ourName){
    const a=_abbr(espnName).toLowerCase();
    const b=ourName.toLowerCase();
    if(a===b||a.includes(b)||b.includes(a)) return true;
    // Also try ESPN longName abbreviation match
    const abbrev=_abbr(espnName);
    return abbrev.toLowerCase()===ourName.toLowerCase();
  }

  items.forEach(item=>{
    if(!item||!item.teams||item.teams.length<2) return;
    // Must have real team objects (filters out social links, series entries etc.)
    const t0=item.teams[0]?.team, t1=item.teams[1]?.team;
    if(!t0||!t1) return;

    const t0name=t0.abbreviation||t0.name||"";  // e.g. "MI"
    const t1name=t1.abbreviation||t1.name||"";  // e.g. "DC"
    const t0long=t0.longName||t0.name||"";       // e.g. "Mumbai Indians"
    const t1long=t1.longName||t1.name||"";

    const isLive=item.status==="Live"||item.teams.some(t=>t.isLive);
    const isDone=item.status==="RESULT";

    // Find the score: whichever team has inningNumbers set is batting
    const batting0=item.teams[0];
    const batting1=item.teams[1];
    const score0=batting0.score||"";  // e.g. "85/4"
    const score1=batting1.score||"";
    const overs0=batting0.scoreInfo||""; // e.g. "12/20 ov"
    const overs1=batting1.scoreInfo||"";

    const venue=item.venue?.name||"";
    const espnId=item.match_id||"";

    // Find matching entry in our matchData (try both team order permutations)
    const existing=all.find(e=>
      (_teamsMatch(t0long,e.team1.name)||_teamsMatch(t0name,e.team1.name)) &&
      (_teamsMatch(t1long,e.team2.name)||_teamsMatch(t1name,e.team2.name))
    ) || all.find(e=>
      (_teamsMatch(t0long,e.team2.name)||_teamsMatch(t0name,e.team2.name)) &&
      (_teamsMatch(t1long,e.team1.name)||_teamsMatch(t1name,e.team1.name))
    );

    if(existing){
      existing._espnId=espnId||existing._espnId;
      if(venue&&!existing.extra) existing.extra="📍 "+venue;

      // Update scores with live data
      // Determine which ESPN team maps to which of our team1/team2
      const t0isTeam1=_teamsMatch(t0long,existing.team1.name)||_teamsMatch(t0name,existing.team1.name);
      const myT1data=t0isTeam1?batting0:batting1;
      const myT2data=t0isTeam1?batting1:batting0;
      if(myT1data.score){
        const [r,w]=(myT1data.score||"").split("/");
        existing.team1.score=r||existing.team1.score;
        if(w!==undefined) existing.team1.wkts=w;
        if(myT1data.scoreInfo) existing.team1.overs=myT1data.scoreInfo.replace("ov","").trim()+" ov";
      }
      if(myT2data.score){
        const [r,w]=(myT2data.score||"").split("/");
        existing.team2.score=r||existing.team2.score;
        if(w!==undefined) existing.team2.wkts=w;
        if(myT2data.scoreInfo) existing.team2.overs=myT2data.scoreInfo.replace("ov","").trim()+" ov";
      }

      // Update badge/status
      if(isLive&&existing.badge!=="live"){
        existing.badge="live";
        existing.status="🔴 LIVE";
        matchData.upcoming=matchData.upcoming.filter(x=>x!==existing);
        matchData.completed=matchData.completed.filter(x=>x!==existing);
        if(!matchData.live.includes(existing)) matchData.live.unshift(existing);
      } else if((isDone||item.status==="RESULT"||item.status==="result")&&existing.badge!=="completed"){
        existing.badge="completed";
        existing.result=existing.result||"✅ "+(item.status||"Match completed");
        matchData.live=matchData.live.filter(x=>x!==existing);
        matchData.upcoming=matchData.upcoming.filter(x=>x!==existing);
        if(!matchData.completed.includes(existing)) matchData.completed.unshift(existing);
      } else if(isLive){
        existing.status="🔴 LIVE";
      }
      changed=true;

    } else if(isLive){
      // Live match ESPN knows about but not in our hardcoded list — add it
      const seriesName=item.series?.name||"";
      const label=`${seriesName?seriesName+" · ":""}${_abbr(t0long)} vs ${_abbr(t1long)}`;
      matchData.live.push({
        label, badge:"live", apiId:null, _espnId:espnId,
        team1:{flag:_teamFlag(t0long),name:_abbr(t0long),score:score0.split("/")[0]||"",wkts:score0.split("/")[1]||"",overs:overs0},
        team2:{flag:_teamFlag(t1long),name:_abbr(t1long),score:score1.split("/")[0]||"",wkts:score1.split("/")[1]||"",overs:overs1},
        status:"🔴 LIVE", extra:venue?"📍 "+venue:"", result:"", listen:false
      });
      changed=true;
    }
  });
  if(changed) renderMatches(currentTab);
}

// ── ESPN CRICINFO LIVE ENRICHMENT (legacy — kept for backward compat) ──
async function fetchEspnLiveEnrichment(){
  try{
    const espnItems=await _fetchEspnLiveScores();
    if(!espnItems||!espnItems.length) return;
    const all=[...matchData.live,...matchData.upcoming,...matchData.completed];
    let changed=false;
    espnItems.forEach(item=>{
      if(!item) return;
      // ESPN item has: homeTeam, awayTeam, status, venue, competition, scores etc.
      const t1=item.homeTeam?.name||item.team1||"";
      const t2=item.awayTeam?.name||item.team2||"";
      if(!t1||!t2) return;
      const existing=all.find(e=>{
        const n1=e.team1.name.toLowerCase(), n2=e.team2.name.toLowerCase();
        const et1=t1.toLowerCase(), et2=t2.toLowerCase();
        return (et1.includes(n1)||n1.includes(et1))&&(et2.includes(n2)||n2.includes(et2));
      });
      if(existing){
        // Enrich with ESPN data (venue, competition, status text etc.)
        if(item.venue&&!existing.extra) existing.extra="📍 "+item.venue;
        if(item.competition) existing._espnComp=item.competition;
        // If ESPN has more precise score data, update it
        if(item.homeTeam?.score&&item.homeTeam.score!=="") existing.team1.score=String(item.homeTeam.score);
        if(item.awayTeam?.score&&item.awayTeam.score!=="") existing.team2.score=String(item.awayTeam.score);
        existing._espnId=item.id||item.matchId;
        changed=true;
      }
    });
    if(changed) renderMatches(currentTab);
  }catch(e){
    // ESPN enrichment is optional — fail silently
    console.log("ESPN live enrichment skipped:",e.message);
  }
}

// ── SMART POLL INTERVAL ─────────────────────────────────────────────────────
// Budget: 1000 calls/day. ONE CricAPI call per poll.
// Background (no live match open):  every 3 minutes  = 480 calls/day max
// When detail screen open (live):   every 90 seconds = up to 960/day but
//   only fires while tab is visible (page visibility guard inside _fetchCricapiScores)
// ESPN Cricinfo runs in parallel but doesn't count against CricAPI budget.
let _pollIntervalId=null;
function _startSmartPolling(){
  if(_pollIntervalId) clearInterval(_pollIntervalId);
  const isDetailOpen=!document.getElementById("matchDetailScreen").classList.contains("slide-in");
  const interval=isDetailOpen?90000:180000; // 90s watching a match, 3min on list
  _pollIntervalId=setInterval(fetchLiveScores, interval);
}
// ── STARTUP: expire any hardcoded upcoming match whose date has passed ──
// Prevents matches like "DC vs MI · Apr 4" from staying stuck in the upcoming list.
(function _expirePastUpcomingMatches(){
  const today=new Date(); today.setHours(0,0,0,0);
  const M={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  matchData.upcoming=matchData.upcoming.filter(m=>{
    const dm=(m.extra||"").match(/·\s*([A-Z][a-z]{2})\s+(\d+),\s*(\d{4})/);
    if(!dm) return true;
    const d=new Date(parseInt(dm[3]),M[dm[1]],parseInt(dm[2]));
    if(d<today){
      m.badge="completed";
      m.result=m.result||"✅ Match completed";
      if(!matchData.completed.find(x=>x.label===m.label)) matchData.completed.unshift(m);
      return false;
    }
    return true;
  });
})();

fetchLiveScores();      // immediate first load
_startSmartPolling();   // then schedule repeating

// Restart polling with tighter interval when user opens/closes match detail
document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("matchDetailScreen").addEventListener("transitionend",_startSmartPolling);
});

</script>
